<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kira</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Nunito:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#0f0e17;--bg-surface:#171526;--bg-elevated:#1e1b2e;
  --bg-chat-her:#2a2440;--bg-chat-you:#3d2a4a;
  --text-primary:#e8e0f0;--text-secondary:#9b8fb0;--text-muted:#6b5f80;
  --accent-rose:#e8758a;--accent-rose-soft:#c06878;--accent-warm:#d4956a;
  --accent-blush:#f0a0b0;--accent-glow:rgba(232,117,138,0.15);
  --border-subtle:rgba(155,143,176,0.08);--shadow-soft:0 2px 20px rgba(0,0,0,0.3);
  --radius-sm:8px;--radius-md:16px;--radius-lg:24px;--radius-bubble:20px;
  --glass:rgba(255,255,255,0.04);--glow-strong:rgba(232,117,138,0.32);
  --header-grad:linear-gradient(180deg,var(--bg-surface) 0%,rgba(23,21,38,0.7) 70%,transparent 100%)
}
html,body{height:100%;overflow:hidden;background:var(--bg-deep);color:var(--text-primary);
  font-family:'Nunito',sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 30% 20%,rgba(232,117,138,0.04) 0%,transparent 50%),
             radial-gradient(ellipse at 70% 80%,rgba(212,149,106,0.03) 0%,transparent 50%);
  animation:ambientDrift 30s ease-in-out infinite alternate;pointer-events:none;z-index:0}
@keyframes ambientDrift{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(-3%,2%) rotate(2deg)}}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;max-width:520px;margin:0 auto}
#header{display:flex;align-items:center;gap:14px;padding:16px 20px;
  background:var(--header-grad);
  border-bottom:1px solid var(--border-subtle);flex-shrink:0;position:relative;z-index:10;backdrop-filter:blur(14px)}
#avatar-ring{position:relative;width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent-rose),var(--accent-warm));padding:2px;flex-shrink:0}
#avatar{width:100%;height:100%;border-radius:50%;background:var(--bg-elevated);
  display:flex;align-items:center;justify-content:center;
  font-family:'Quicksand',sans-serif;font-size:20px;font-weight:700;color:var(--accent-rose)}
#status-dot{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;
  background:#5ae07a;border:2.5px solid var(--bg-surface);animation:statusPulse 3s ease-in-out infinite}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:0.5}}
#header-info{flex:1;min-width:0}
#header-name{font-family:'Quicksand',sans-serif;font-weight:700;font-size:17px;
  color:var(--text-primary);letter-spacing:0.3px}
#header-status{font-size:12px;color:var(--text-muted);margin-top:1px;transition:color 0.5s ease}
#neural-badge{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:10px;
  background:rgba(100,80,140,0.2);border:1px solid rgba(155,143,176,0.12);
  font-size:10px;color:var(--text-muted);font-family:'Quicksand',sans-serif;
  font-weight:600;letter-spacing:0.3px;transition:all 0.4s ease;user-select:none}
#neural-badge.learning{color:var(--accent-rose);border-color:rgba(232,117,138,0.25);background:var(--accent-glow)}
#neural-pulse{width:5px;height:5px;border-radius:50%;background:var(--text-muted);transition:background 0.4s ease}
#neural-badge.learning #neural-pulse{background:var(--accent-rose);animation:neuralPing 0.8s ease-in-out 3}
@keyframes neuralPing{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:0.5}}
#settings-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;
  padding:8px;border-radius:50%;transition:all 0.2s;font-size:18px}
#settings-btn:hover{color:var(--accent-rose);background:var(--accent-glow)}
#chat-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 16px;
  display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth;overscroll-behavior:contain}
#chat-area::-webkit-scrollbar{width:3px}
#chat-area::-webkit-scrollbar-track{background:transparent}
#chat-area::-webkit-scrollbar-thumb{background:var(--border-subtle);border-radius:3px}
.msg-group{display:flex;flex-direction:column;gap:3px;max-width:82%;
  animation:msgIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both}
.msg-group.her{align-self:flex-start}.msg-group.you{align-self:flex-end}
@keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.bubble{padding:11px 16px;line-height:1.55;word-wrap:break-word;position:relative}
.her .bubble{background:var(--bg-chat-her);border-radius:var(--radius-bubble) var(--radius-bubble) var(--radius-bubble) 6px;color:var(--text-primary)}
.you .bubble{background:linear-gradient(135deg,var(--bg-chat-you),#3a2548);border-radius:var(--radius-bubble) var(--radius-bubble) 6px var(--radius-bubble);color:var(--text-primary)}
.msg-time{font-size:10px;color:var(--text-muted);margin-top:4px;opacity:0.7}
.her .msg-time{padding-left:4px}.you .msg-time{text-align:right;padding-right:4px}
#typing-indicator{align-self:flex-start;display:none;padding:14px 20px;
  background:var(--bg-chat-her);border-radius:var(--radius-bubble) var(--radius-bubble) var(--radius-bubble) 6px;
  margin-bottom:4px;animation:msgIn 0.3s ease both}
#typing-indicator.visible{display:flex;gap:5px;align-items:center}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:typingBounce 1.4s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:0.15s}.typing-dot:nth-child(3){animation-delay:0.3s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-6px);opacity:1}}
#input-area{padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));
  background:var(--bg-surface);border-top:1px solid var(--border-subtle);flex-shrink:0}
#input-row{display:flex;align-items:flex-end;gap:10px;background:var(--bg-elevated);
  border-radius:var(--radius-lg);padding:6px 6px 6px 18px;
  border:1px solid var(--border-subtle);transition:border-color 0.3s}
#input-row:focus-within{border-color:rgba(232,117,138,0.25)}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--text-primary);
  font-family:'Nunito',sans-serif;font-size:15px;line-height:1.4;
  resize:none;max-height:120px;padding:8px 0;scrollbar-width:none}
#msg-input::placeholder{color:var(--text-muted)}
#msg-input::-webkit-scrollbar{display:none}
#input-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding:0 4px;font-size:11px;color:var(--text-muted);font-family:'Quicksand',sans-serif}
#input-count.warn{color:var(--accent-warm)}
#input-count.limit{color:#d46060;font-weight:700}
#send-btn{width:40px;height:40px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--accent-rose),var(--accent-rose-soft));
  color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;opacity:0.5}
#send-btn.active{opacity:1}#send-btn.active:hover{transform:scale(1.05)}
#send-btn:active{transform:scale(0.93)}#send-btn svg{width:18px;height:18px;fill:white}
.date-sep{text-align:center;font-size:11px;color:var(--text-muted);padding:12px 0 8px;
  font-weight:600;letter-spacing:0.5px;text-transform:uppercase;font-family:'Quicksand',sans-serif}
.system-msg{text-align:center;font-size:12px;color:var(--text-muted);font-style:italic;
  padding:8px 20px;max-width:85%;align-self:center;animation:msgIn 0.4s ease both}
#settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);
  z-index:100;display:none;align-items:flex-end;justify-content:center}
#settings-overlay.open{display:flex}
#settings-panel{width:100%;max-width:520px;max-height:80vh;background:var(--bg-surface);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:24px 20px;overflow-y:auto;
  animation:slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.settings-title{font-family:'Quicksand',sans-serif;font-size:20px;font-weight:700;margin-bottom:20px;color:var(--accent-rose)}
.settings-section{margin-bottom:20px}
.settings-section label{display:block;font-size:12px;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:0.8px;margin-bottom:8px;font-family:'Quicksand',sans-serif;font-weight:600}
.settings-section input[type="text"]{width:100%;padding:10px 14px;background:var(--bg-elevated);
  border:1px solid var(--border-subtle);border-radius:var(--radius-sm);color:var(--text-primary);
  font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border-color 0.3s}
.settings-section input:focus{border-color:rgba(232,117,138,0.3)}
.settings-row{display:flex;gap:10px;flex-wrap:wrap}
.settings-chip{padding:6px 14px;border-radius:20px;font-size:13px;background:var(--bg-elevated);
  border:1px solid var(--border-subtle);color:var(--text-secondary);cursor:pointer;transition:all 0.2s;
  font-family:'Quicksand',sans-serif;font-weight:500}
.settings-chip:hover{border-color:var(--accent-rose-soft);color:var(--text-primary)}
.settings-chip.active{background:var(--accent-glow);border-color:var(--accent-rose);color:var(--accent-rose)}
.settings-actions{display:flex;gap:10px;margin-top:24px}
.btn-primary,.btn-ghost{flex:1;padding:12px;border-radius:var(--radius-sm);
  font-family:'Quicksand',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all 0.2s;border:none}
.btn-primary{background:linear-gradient(135deg,var(--accent-rose),var(--accent-rose-soft));color:white}
.btn-ghost{background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border-subtle)}
.btn-danger{width:100%;padding:10px;margin-top:16px;border-radius:var(--radius-sm);
  background:transparent;border:1px solid rgba(220,70,70,0.3);color:#d46060;
  font-family:'Quicksand',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all 0.2s}
.btn-danger:hover{background:rgba(220,70,70,0.1)}
#affection-bar-wrap{margin-bottom:16px}
#affection-label{font-size:11px;color:var(--text-muted);margin-bottom:6px;display:flex;
  justify-content:space-between;font-family:'Quicksand',sans-serif;font-weight:600;
  text-transform:uppercase;letter-spacing:0.8px}
#affection-track{height:6px;background:var(--bg-deep);border-radius:3px;overflow:hidden}
#affection-fill{height:100%;background:linear-gradient(90deg,var(--accent-rose-soft),var(--accent-rose),var(--accent-blush));
  border-radius:3px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1);width:0%}
#ai-stats{padding:12px 14px;border-radius:var(--radius-sm);background:var(--bg-elevated);
  border:1px solid var(--border-subtle);font-size:11px;color:var(--text-muted);
  font-family:'Quicksand',sans-serif;line-height:1.8}
#ai-stats b{color:var(--text-secondary);font-weight:600}
@media(max-width:520px){#app{max-width:100%}.msg-group{max-width:88%}}

/* ── Profile pic ── */
#avatar img.avatar-photo{width:100%;height:100%;border-radius:50%;object-fit:cover;cursor:zoom-in}
#avatar-ring{cursor:pointer}
#avatar-ring:hover{transform:scale(1.06);transition:transform 0.2s}

/* ── Image zoom overlay ── */
#img-zoom-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);
  z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#img-zoom-overlay.open{display:flex}
#img-zoom-view{max-width:92vw;max-height:82vh;border-radius:16px;object-fit:contain;
  box-shadow:0 8px 60px rgba(0,0,0,0.7);animation:zoomIn 0.25s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes zoomIn{from{opacity:0;transform:scale(0.82)}to{opacity:1;transform:scale(1)}}
#img-zoom-close{color:rgba(255,255,255,0.7);font-size:32px;cursor:pointer;line-height:1;
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;background:rgba(255,255,255,0.1);transition:all 0.2s;align-self:flex-end;margin-right:4vw}
#img-zoom-close:hover{background:rgba(255,255,255,0.2);color:white}

/* ── Chat image bubbles ── */
.bubble-img{padding:4px!important;overflow:hidden}
.chat-img{max-width:100%;max-height:280px;border-radius:14px;display:block;cursor:zoom-in;
  transition:transform 0.2s;object-fit:cover}
.chat-img:hover{transform:scale(1.02)}

/* ── Image upload button ── */
#img-upload-btn{width:36px;height:36px;border-radius:50%;border:none;background:none;
  color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;padding:0}
#img-upload-btn:hover{color:var(--accent-rose);background:var(--accent-glow)}
#img-upload-btn svg{width:18px;height:18px}
#img-file-input{display:none}

/* ── Settings profile pic ── */
#profile-pic-section{display:flex;align-items:center;gap:14px;margin-bottom:8px}
#settings-avatar-preview{width:64px;height:64px;border-radius:50%;background:var(--bg-elevated);
  border:2px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;
  font-family:'Quicksand',sans-serif;font-size:26px;font-weight:700;color:var(--accent-rose);
  overflow:hidden;flex-shrink:0}
#settings-avatar-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%}
#pic-btn-group{display:flex;flex-direction:column;gap:6px}
.btn-pic{padding:7px 14px;border-radius:var(--radius-sm);font-family:'Quicksand',sans-serif;
  font-weight:600;font-size:12px;cursor:pointer;transition:all 0.2s;border:none}
.btn-pic-upload{background:var(--accent-glow);border:1px solid rgba(232,117,138,0.3);color:var(--accent-rose)}
.btn-pic-remove{background:var(--bg-elevated);border:1px solid var(--border-subtle);color:var(--text-muted)}
#profile-pic-input{display:none}

/* ── Conversation context indicator ── */
#context-pill{display:none;align-items:center;gap:5px;padding:2px 10px;border-radius:10px;
  background:rgba(100,80,140,0.15);border:1px solid rgba(155,143,176,0.1);
  font-size:10px;color:var(--text-muted);font-family:'Quicksand',sans-serif;
  font-weight:600;letter-spacing:0.3px;margin-left:auto;transition:all 0.4s}
#context-pill.active{display:flex;color:var(--accent-warm)}
#header-actions{display:flex;align-items:center;gap:6px}
.icon-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:8px;border-radius:50%;transition:all 0.2s;font-size:18px}
.icon-btn:hover{color:var(--accent-rose);background:var(--accent-glow)}
#theme-btn{font-size:17px}
#insight-dock{margin:10px 14px 0;padding:12px;border:1px solid var(--border-subtle);border-radius:14px;
  background:linear-gradient(135deg,var(--glass),rgba(255,255,255,0.02));display:flex;flex-direction:column;gap:10px}
#insight-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.insight-card{padding:8px;border-radius:10px;background:rgba(0,0,0,0.18);border:1px solid var(--border-subtle)}
.insight-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);font-family:'Quicksand',sans-serif;font-weight:700}
.insight-value{font-size:12px;color:var(--text-primary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#quick-actions{display:flex;gap:8px;flex-wrap:wrap}
.quick-chip{padding:6px 10px;border-radius:999px;border:1px solid rgba(232,117,138,0.25);background:rgba(232,117,138,0.08);color:var(--accent-blush);font-size:11px;cursor:pointer;font-family:'Quicksand',sans-serif;font-weight:700;transition:all .2s}
.quick-chip:hover{transform:translateY(-1px);background:rgba(232,117,138,0.18)}
body.theme-aurora{
  --bg-deep:#070b1d;--bg-surface:#111936;--bg-elevated:#172449;
  --bg-chat-her:#1a2f57;--bg-chat-you:#2b315e;--text-primary:#eaf1ff;--text-secondary:#c0cde8;
  --text-muted:#8ea2c7;--accent-rose:#6bc5ff;--accent-rose-soft:#4ca9e8;--accent-warm:#86e6c4;
  --accent-blush:#a7e3ff;--accent-glow:rgba(107,197,255,0.16);--glow-strong:rgba(107,197,255,0.3);
  --header-grad:linear-gradient(180deg,#111936 0%,rgba(17,25,54,0.76) 70%,transparent 100%)
}
@media(max-width:520px){#insight-stats{grid-template-columns:repeat(2,minmax(0,1fr))}}

</style>

<script type="module">
  window.loadWebLLMEngine = async () => {
    if(!window.webllmEngine) {
      const { CreateMLCEngine } = await import("https://esm.run/@mlc-ai/web-llm");
      window.webllmEngine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
        initProgressCallback: (progress) => {
          console.log("WebLLM loading:", progress.text);
        }
      });
    }
    return window.webllmEngine;
  };
</script>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="avatar-ring" title="Click to view profile"><div id="avatar">K</div><div id="status-dot"></div></div>
    <div id="header-info"><div id="header-name">Kira</div><div id="header-status">online</div></div>
    <div id="neural-badge" title="Neural engine active"><div id="neural-pulse"></div><span>neural</span></div>
    <div id="context-pill" title="Current conversation context"></div>
    <div id="header-actions">
      <button id="theme-btn" class="icon-btn" type="button" aria-label="Toggle aura mode" aria-pressed="false" title="Toggle aura mode">✦</button>
      <button id="settings-btn" class="icon-btn" type="button" aria-label="Open settings" title="Settings">⚙</button>
    </div>
  </div>
  <div id="insight-dock">
    <div id="insight-stats">
      <div class="insight-card"><div class="insight-label">Her Mood</div><div class="insight-value" id="insight-mood">neutral</div></div>
      <div class="insight-card"><div class="insight-label">Energy</div><div class="insight-value" id="insight-energy">70%</div></div>
      <div class="insight-card"><div class="insight-label">Bond</div><div class="insight-value" id="insight-stage">Stranger</div></div>
      <div class="insight-card"><div class="insight-label">Streak</div><div class="insight-value" id="insight-streak">0 days</div></div>
    </div>
    <div id="quick-actions">
      <button class="quick-chip" type="button" data-prompt="Tell me something unexpectedly sweet.">Sweet Prompt</button>
      <button class="quick-chip" type="button" data-prompt="Ask me one deep question.">Deep Question</button>
      <button class="quick-chip" type="button" data-prompt="Give me a tiny challenge for today.">Mini Challenge</button>
    </div>
  </div>
  <div id="chat-area"></div>
  <div id="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
  <div id="input-area">
    <div id="input-row">
      <button id="img-upload-btn" title="Send an image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <input type="file" id="img-file-input" accept="image/*">
      <textarea id="msg-input" rows="1" placeholder="Say something..." autocomplete="off"></textarea>
      <button id="send-btn"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
    <div id="input-meta">
      <span id="input-count">0 / 300</span>
      <span id="input-hint">Enter to send · Shift+Enter for newline</span>
    </div>
  </div>
</div>
<div id="settings-overlay">
  <div id="settings-panel">
    <div class="settings-title">Settings</div>
    <div id="affection-bar-wrap">
      <div id="affection-label"><span>Affection</span><span id="affection-stage">New</span></div>
      <div id="affection-track"><div id="affection-fill"></div></div>
    </div>
    <div class="settings-section">
      <label>Kira's Profile Picture</label>
      <div id="profile-pic-section">
        <div id="settings-avatar-preview">K</div>
        <div id="pic-btn-group">
          <button class="btn-pic btn-pic-upload" id="profile-pic-btn">Upload Photo</button>
          <button class="btn-pic btn-pic-remove" id="profile-pic-remove" style="display:none">Remove</button>
        </div>
        <input type="file" id="profile-pic-input" accept="image/*">
      </div>
    </div>

<script id="kira-worker-code" type="javascript/worker">
let rng = () => crypto.getRandomValues(new Uint32Array(1))[0] / 4294967296;
function mulberry32(a) {
  return function() {
    var t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

//  §1  MATRIX KERNEL  ·  typed Float32Array operations
// ─────────────────────────────────────────────────────────────────────
const M={
  zeros:(n)=>new Float32Array(n),

  // Box-Muller normal sampling
  randn:(n,scale=0.1)=>{
    const d=new Float32Array(n);
    for(let i=0;i<n;i+=2){
      const u1=rng()+1e-10,u2=rng();
      const r=scale*Math.sqrt(-2*Math.log(u1));
      d[i]=r*Math.cos(2*Math.PI*u2);
      if(i+1<n)d[i+1]=r*Math.sin(2*Math.PI*u2);
    }
    return d;
  },

  // y = Wx + b
  linear:(x,W,b,inD,outD)=>{
    const y=new Float32Array(outD);
    for(let j=0;j<outD;j++){
      let s=b[j];
      for(let i=0;i<inD;i++)s+=W[i*outD+j]*x[i];
      y[j]=s;
    }
    return y;
  },

  // dW=x⊗dy, db=dy, dx=W^T·dy
  linearBack:(dy,x,W,inD,outD)=>{
    const dW=new Float32Array(inD*outD),db=new Float32Array(outD),dx=new Float32Array(inD);
    for(let j=0;j<outD;j++)db[j]=dy[j];
    for(let i=0;i<inD;i++)for(let j=0;j<outD;j++){dW[i*outD+j]=x[i]*dy[j];dx[i]+=W[i*outD+j]*dy[j];}
    return{dW,db,dx};
  },

  relu:(x)=>x.map(v=>v>0?v:0),
  reluBack:(dy,z)=>Float32Array.from(dy,(v,i)=>z[i]>0?v:0),

  softmax:(x)=>{
    let mx=-Infinity;for(const v of x)if(v>mx)mx=v;
    let s=0;const e=x.map(v=>{const t=Math.exp(v-mx);s+=t;return t;});
    return e.map(v=>v/(s+1e-30));
  },

  dot:(a,b)=>{let s=0;for(let i=0;i<a.length;i++)s+=a[i]*b[i];return s;},
  add:(a,b)=>Float32Array.from(a,(v,i)=>v+b[i]),
  scale:(a,s)=>a.map(v=>v*s),

  cosine:(a,b)=>{
    let d=0,na=0,nb=0;
    for(let i=0;i<a.length;i++){d+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}
    return d/(Math.sqrt(na*nb)+1e-10);
  },

  l2:(a)=>{let n=0;for(const v of a)n+=v*v;return Math.sqrt(n)+1e-10;},
  normalize:(a)=>{const n=M.l2(a);return a.map(v=>v/n);},

  // Gradient clipping by global norm
  clipNorm:(g,maxN=1.0)=>{const n=M.l2(g);return n<=maxN?g:g.map(v=>v*maxN/n);},

  // Pack Float32Array to base64 for localStorage
  pack:(arr)=>{
    const bytes=new Uint8Array(arr.buffer);let s='';const C=8192;
    for(let i=0;i<bytes.length;i+=C)s+=String.fromCharCode(...bytes.subarray(i,Math.min(i+C,bytes.length)));
    return btoa(s);
  },
  unpack:(str)=>{
    const bin=atob(str),u8=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
    return new Float32Array(u8.buffer);
  }
};

// ─────────────────────────────────────────────────────────────────────
//  §2  ADAM OPTIMIZER  ·  β₁=0.9, β₂=0.999, bias-corrected moments
// ─────────────────────────────────────────────────────────────────────
class Adam{
  constructor(n,lr=5e-4){
    this.m=M.zeros(n);this.v=M.zeros(n);
    this.t=0;this.lr=lr;this.b1=0.9;this.b2=0.999;this.eps=1e-8;
  }
  step(p,g){
    this.t++;
    const{b1,b2,eps,lr,t}=this;
    const bc1=1-Math.pow(b1,t),bc2=1-Math.pow(b2,t);
    for(let i=0;i<p.length;i++){
      this.m[i]=b1*this.m[i]+(1-b1)*g[i];
      this.v[i]=b2*this.v[i]+(1-b2)*g[i]*g[i];
      p[i]-=lr*(this.m[i]/bc1)/(Math.sqrt(this.v[i]/bc2)+eps);
    }
  }
  save(){return{m:M.pack(this.m),v:M.pack(this.v),t:this.t,lr:this.lr};}
  load(d){this.m=M.unpack(d.m);this.v=M.unpack(d.v);this.t=d.t||0;if(d.lr)this.lr=d.lr;}
}

// ─────────────────────────────────────────────────────────────────────
//  §3  LINEAR LAYER  ·  y = Wx + b with full backprop
// ─────────────────────────────────────────────────────────────────────
class Linear{
  constructor(inD,outD,lr=5e-4){
    this.inD=inD;this.outD=outD;
    const s=Math.sqrt(2.0/inD); // He initialization
    this.W=M.randn(inD*outD,s);this.b=M.zeros(outD);
    this.oW=new Adam(inD*outD,lr);this.ob=new Adam(outD,lr);
    this._x=null;
  }
  fwd(x){this._x=x;return M.linear(x,this.W,this.b,this.inD,this.outD);}
  bwd(dy){
    const{dW,db,dx}=M.linearBack(dy,this._x,this.W,this.inD,this.outD);
    this.oW.step(this.W,M.clipNorm(dW));this.ob.step(this.b,M.clipNorm(db));
    return dx;
  }
  save(){return{W:M.pack(this.W),b:M.pack(this.b),oW:this.oW.save(),ob:this.ob.save()};}
  load(d){this.W=M.unpack(d.W);this.b=M.unpack(d.b);this.oW.load(d.oW);this.ob.load(d.ob);}
}

// ─────────────────────────────────────────────────────────────────────
//  §4  HASH EMBEDDING  ·  FNV-1a n-gram hashing → learned dense vectors
//  Hash-trick: Weinberger et al. (2009) — collision-tolerant sparse→dense
// ─────────────────────────────────────────────────────────────────────
const VOCAB=128,EDIM=16;

class HashEmbed{
  constructor(lr=5e-4){
    this.E=M.randn(VOCAB*EDIM,0.05);
    this.opt=new Adam(VOCAB*EDIM,lr);
    this._sp=null;
  }
  _fnv(s){
    let h=2166136261;
    for(let i=0;i<s.length;i++)h=((h^s.charCodeAt(i))*16777619)>>>0;
    return h%VOCAB;
  }
  _features(text){
    const t=text.toLowerCase().slice(0,300),fm=new Map();
    const bump=(k,w)=>fm.set(k,(fm.get(k)||0)+w);
    for(const w of t.split(/\s+/))if(w.length>0)bump(this._fnv(w),1.0);
    const p='^'+t+'$';
    for(let i=0;i<p.length-1;i++)bump(this._fnv(p.slice(i,i+2)),0.4);
    for(let i=0;i<p.length-2;i++)bump(this._fnv(p.slice(i,i+3)),0.25);
    let total=0;for(const v of fm.values())total+=v;
    const sp=[];for(const[k,v]of fm)sp.push([k,v/(total+1e-10)]);
    return sp;
  }
  fwd(text){
    const sp=this._features(text);this._sp=sp;
    const out=M.zeros(EDIM);
    for(const[idx,val]of sp){const o=idx*EDIM;for(let j=0;j<EDIM;j++)out[j]+=this.E[o+j]*val;}
    return out;
  }
  bwd(dy){
    const dE=M.zeros(VOCAB*EDIM);
    for(const[idx,val]of this._sp){const o=idx*EDIM;for(let j=0;j<EDIM;j++)dE[o+j]+=dy[j]*val;}
    this.opt.step(this.E,M.clipNorm(dE,0.5));
  }
  save(){return{E:M.pack(this.E),opt:this.opt.save()};}
  load(d){this.E=M.unpack(d.E);this.opt.load(d.opt);}
}

// ─────────────────────────────────────────────────────────────────────
//  §5  MOOD NET  ·  3-layer MLP, cross-entropy, knowledge distillation
//  Embed(16)→Linear(32)→ReLU→Linear(11)→Softmax
// ─────────────────────────────────────────────────────────────────────
const MOOD_LABELS=['neutral','happy','sad','angry','anxious','flirty','bored','tired','curious','grateful','vulnerable'];
const N_MOODS=MOOD_LABELS.length;

class MoodNet{
  constructor(){
    this.enc=new HashEmbed(5e-4);
    this.l1=new Linear(EDIM,32,5e-4);
    this.l2=new Linear(32,N_MOODS,5e-4);
    this._cache={};this.updates=0;
  }
  fwd(text){
    const emb=this.enc.fwd(text);
    const z1=this.l1.fwd(emb);
    const h1=M.relu(z1);
    const z2=this.l2.fwd(h1);
    const p=M.softmax(z2);
    this._cache={emb,z1,h1,p};
    return p;
  }
  // target: mood index, reward: magnitude+sign of learning signal
  bwd(target,reward=1.0){
    const{z1,h1,p}=this._cache;
    const ls=Math.abs(reward)*0.06;
    // ∂L/∂z2 = (softmax_output − one_hot_target) × learning_scale × sign(reward)
    const dz2=Float32Array.from(p,(v,i)=>(v-(i===target?1.0:0.0))*ls*Math.sign(reward));
    const dh1=this.l2.bwd(dz2);
    const dz1=M.reluBack(dh1,z1); // ReLU gate: zero grad where pre-activation ≤ 0
    const demb=this.l1.bwd(dz1);
    this.enc.bwd(demb);
    this.updates++;
  }
  save(){return{enc:this.enc.save(),l1:this.l1.save(),l2:this.l2.save(),upd:this.updates};}
  load(d){this.enc.load(d.enc);this.l1.load(d.l1);this.l2.load(d.l2);this.updates=d.upd||0;}
}

// ─────────────────────────────────────────────────────────────────────
//  §5B  COMPOUND MOOD NET  ·  NM-02: single Linear(16,3) head sharing
//  MoodNet's HashEmbed. Detects sarcasm/nostalgia/excitement — signals
//  the primary 11-class softmax has no room for. N_MOODS stays locked
//  at 11 (INV-05); this is an additive parallel head, not an expansion.
// ─────────────────────────────────────────────────────────────────────
const COMPOUND_LABELS=['sarcastic','nostalgic','excited'];
const N_COMPOUND=COMPOUND_LABELS.length;

class CompoundMoodNet{
  constructor(sharedEnc){
    this.enc=sharedEnc; // shared with MoodNet — same learned embedding space, not owned here
    this.l1=new Linear(EDIM,N_COMPOUND,5e-4);
    this._cache={};this.updates=0;
  }
  fwd(text){
    const emb=this.enc.fwd(text);
    const z1=this.l1.fwd(emb);
    const p=M.softmax(z1);
    this._cache={p};
    return p;
  }
  // Only ever called with a positive regex-detected label (see detectCompoundMoodRegex) —
  // there's no "none of the above" class, so we don't train toward an absence of signal.
  // Deliberately does not backprop into the shared encoder: MoodNet.bwd() already trains
  // it every turn, and this head runs far less often (only on positive matches).
  bwd(target,reward=1.0){
    const{p}=this._cache;
    const ls=Math.abs(reward)*0.06;
    const dz1=Float32Array.from(p,(v,i)=>(v-(i===target?1.0:0.0))*ls*Math.sign(reward));
    this.l1.bwd(dz1);
    this.updates++;
  }
  save(){return{l1:this.l1.save(),upd:this.updates};}
  load(d){if(d){this.l1.load(d.l1);this.updates=d.upd||0;}}
}

// ─────────────────────────────────────────────────────────────────────
//  §5C  NER NET  ·  NM-04: single Linear(16,4) head sharing MoodNet's
//  HashEmbed. Coarse category signal only (name/age/preference/
//  disclosure) — a 16-dim hash embedding can't do span extraction, so
//  the actual value text still comes from extractPersonalInfo()'s
//  regex. This head exists to flag disclosures the regex missed.
// ─────────────────────────────────────────────────────────────────────
const NER_LABELS=['name','age','preference','disclosure'];

class NERNet{
  constructor(sharedEnc){
    this.enc=sharedEnc;
    this.l1=new Linear(EDIM,NER_LABELS.length,5e-4);
    this._cache={};this.updates=0;
  }
  fwd(text){
    const emb=this.enc.fwd(text);
    const z1=this.l1.fwd(emb);
    const p=M.softmax(z1);
    this._cache={p};
    return p;
  }
  // Only ever called with a positive regex-detected label — see NM-02's CompoundMoodNet
  // for why there's no "none" class and no shared-encoder backprop here.
  bwd(target,reward=1.0){
    const{p}=this._cache;
    const ls=Math.abs(reward)*0.06;
    const dz1=Float32Array.from(p,(v,i)=>(v-(i===target?1.0:0.0))*ls*Math.sign(reward));
    this.l1.bwd(dz1);
    this.updates++;
  }
  save(){return{l1:this.l1.save(),upd:this.updates};}
  load(d){if(d){this.l1.load(d.l1);this.updates=d.upd||0;}}
}

// ─────────────────────────────────────────────────────────────────────
//  §5D  INTENT NET  ·  NM-01: single Linear(16,8) head sharing MoodNet's
//  HashEmbed. Unlike NM-02/04, 'general' is a real class here, trained
//  from detectIntentRegex()'s decision every turn (same as MoodNet's
//  'neutral'). Never chosen as the primary router — generateResponse()
//  only consults it at the tail, to rescue a message that matched
//  nothing else in the deterministic cascade above it.
// ─────────────────────────────────────────────────────────────────────
const INTENT_LABELS=['greeting','how_are_you','about_her','love_declaration','miss_you','goodbye','compliment','general'];

class IntentNet{
  constructor(sharedEnc){
    this.enc=sharedEnc;
    this.l1=new Linear(EDIM,INTENT_LABELS.length,5e-4);
    this._cache={};this.updates=0;
  }
  fwd(text){
    const emb=this.enc.fwd(text);
    const z1=this.l1.fwd(emb);
    const p=M.softmax(z1);
    this._cache={p};
    return p;
  }
  bwd(target,reward=1.0){
    const{p}=this._cache;
    const ls=Math.abs(reward)*0.06;
    const dz1=Float32Array.from(p,(v,i)=>(v-(i===target?1.0:0.0))*ls*Math.sign(reward));
    this.l1.bwd(dz1);
    this.updates++;
  }
  save(){return{l1:this.l1.save(),upd:this.updates};}
  load(d){if(d){this.l1.load(d.l1);this.updates=d.upd||0;}}
}

// ─────────────────────────────────────────────────────────────────────
//  §6  BILINEAR SCORER  ·  score = ctx^T · W · resp
//  Learns a compatibility matrix W between context and response spaces
// ─────────────────────────────────────────────────────────────────────
class Scorer{
  constructor(){
    this.W=M.randn(EDIM*EDIM,0.04);
    this.opt=new Adam(EDIM*EDIM,3e-4);
    this._cache={};this.updates=0;
  }
  score(ctx,resp){
    const Wv=M.zeros(EDIM);
    for(let i=0;i<EDIM;i++)for(let j=0;j<EDIM;j++)Wv[i]+=this.W[i*EDIM+j]*resp[j];
    this._cache={ctx,resp};
    return M.dot(ctx,Wv);
  }
  bwd(grad){
    const{ctx,resp}=this._cache;
    const dW=M.zeros(EDIM*EDIM);
    for(let i=0;i<EDIM;i++)for(let j=0;j<EDIM;j++)dW[i*EDIM+j]=grad*ctx[i]*resp[j];
    this.opt.step(this.W,M.clipNorm(dW,0.5));
    this.updates++;
  }
  save(){return{W:M.pack(this.W),opt:this.opt.save(),upd:this.updates};}
  load(d){this.W=M.unpack(d.W);this.opt.load(d.opt);this.updates=d.upd||0;}
}

// ─────────────────────────────────────────────────────────────────────
//  §7  ATTENTION MEMORY  ·  Scaled dot-product attention (Vaswani 2017)
//  Q = current message vec, K/V = past conversation turns
//  attn = softmax(Q·K^T / √d_k) · V
// ─────────────────────────────────────────────────────────────────────
const MEM_CAP=20;
const INV_SQRT_EDIM=1.0/Math.sqrt(EDIM);

class AttentionMem{
  constructor(){this.K=[];this.V=[];this.T=[];}

  push(key,val,text){
    this.K.push(key);this.V.push(val);this.T.push(text);
    if(this.K.length>MEM_CAP){this.K.shift();this.V.shift();this.T.shift();}
  }

  attend(query){
    if(!this.K.length)return M.zeros(EDIM);
    const scores=this.K.map(k=>M.dot(query,k)*INV_SQRT_EDIM);
    let mx=-Infinity;for(const s of scores)if(s>mx)mx=s;
    let sum=0;const w=scores.map(s=>{const e=Math.exp(s-mx);sum+=e;return e;});
    const attn=w.map(e=>e/(sum+1e-30));
    const ctx=M.zeros(EDIM);
    for(let i=0;i<this.V.length;i++){const a=attn[i];for(let j=0;j<EDIM;j++)ctx[j]+=a*this.V[i][j];}
    return ctx;
  }

  topk(query,k=2){
    if(!this.K.length)return[];
    return this.K.map((key,i)=>({sim:M.cosine(query,key),text:this.T[i]}))
      .sort((a,b)=>b.sim-a.sim).slice(0,k).filter(r=>r.sim>0.35);
  }

  save(){return{K:this.K.map(v=>M.pack(v)),V:this.V.map(v=>M.pack(v)),T:this.T};}
  load(d){this.K=d.K.map(s=>M.unpack(s));this.V=d.V.map(s=>M.unpack(s));this.T=d.T;}
}

// ─────────────────────────────────────────────────────────────────────
//  §8  KIRAAI ENGINE  ·  Orchestrates all neural components
// ─────────────────────────────────────────────────────────────────────
class KiraAI{
  constructor(){
    this.moodNet=new MoodNet();
    this.compoundMoodNet=new CompoundMoodNet(this.moodNet.enc);
    this.nerNet=new NERNet(this.moodNet.enc);
    this.intentNet=new IntentNet(this.moodNet.enc);
    this.encoder=new HashEmbed(5e-4);
    this.respEnc=new HashEmbed(5e-4);
    this.scorer=new Scorer();
    this.memory=new AttentionMem();
    this._lastCtx=null;this._lastRVec=null;this._lastMIdx=0;
    this.tick=0;this.isLearning=false;
  }

  process(text){
    const msgVec=this.encoder.fwd(text);
    const attnCtx=this.memory.attend(msgVec);
    // Blend: 70% current, 30% attended history
    const ctxVec=new Float32Array(EDIM);
    for(let i=0;i<EDIM;i++)ctxVec[i]=0.7*msgVec[i]+0.3*attnCtx[i];
    const probs=this.moodNet.fwd(text);
    let moodIdx=0,maxP=0;
    for(let i=0;i<probs.length;i++)if(probs[i]>maxP){maxP=probs[i];moodIdx=i;}
    const compoundProbs=this.compoundMoodNet.fwd(text);
    let compoundIdx=0,compoundMaxP=0;
    for(let i=0;i<compoundProbs.length;i++)if(compoundProbs[i]>compoundMaxP){compoundMaxP=compoundProbs[i];compoundIdx=i;}
    const nerProbs=this.nerNet.fwd(text);
    let nerIdx=0,nerMaxP=0;
    for(let i=0;i<nerProbs.length;i++)if(nerProbs[i]>nerMaxP){nerMaxP=nerProbs[i];nerIdx=i;}
    const intentProbs=this.intentNet.fwd(text);
    let intentIdx=0,intentMaxP=0;
    for(let i=0;i<intentProbs.length;i++)if(intentProbs[i]>intentMaxP){intentMaxP=intentProbs[i];intentIdx=i;}
    const similar=this.memory.topk(msgVec,2);
    const h1_sub=(this.moodNet._cache.h1||new Float32Array(32)).slice(0,EDIM);
    this.memory.push(M.normalize(msgVec),h1_sub,text.slice(0,60));
    this._lastCtx=ctxVec;this._lastMIdx=moodIdx;this.tick++;
    return{mood:MOOD_LABELS[moodIdx],probs,ctxVec,similar,confidence:maxP,
      compound:{label:COMPOUND_LABELS[compoundIdx],confidence:compoundMaxP},
      ner:{label:NER_LABELS[nerIdx],confidence:nerMaxP},
      intent:{label:INTENT_LABELS[intentIdx],confidence:intentMaxP}};
  }

  // Temperature-weighted sampling from top-K ranked candidates
  rank(candidates,ctxVec){
    if(!candidates||!candidates.length)return'';
    if(!ctxVec)return candidates[Math.floor(rng()*candidates.length)];
    const scored=candidates.map(text=>{
      const rv=this.respEnc.fwd(text);
      const bilin=this.scorer.score(ctxVec,rv);
      const cos=M.cosine(ctxVec,rv);
      const score=0.55*Math.tanh(bilin)+0.45*cos;
      return{text,score,rv};
    });
    scored.sort((a,b)=>b.score-a.score);
    const K=Math.min(3,scored.length),T=0.65;
    const top=scored.slice(0,K);const ms=top[0].score;
    let sum=0;const w=top.map(c=>{const e=Math.exp((c.score-ms)/T);sum+=e;return e;});
    let r=rng()*sum,chosen=top[0];
    for(let i=0;i<top.length;i++){r-=w[i];if(r<=0){chosen=top[i];break;}}
    this._lastRVec=chosen.rv;
    return chosen.text;
  }

  // Online learning: distill regex teacher into neural student
  feedback(signal,regexMoodIdx){
    if(signal===0&&regexMoodIdx<0)return;
    this.isLearning=true;
    if(regexMoodIdx>=0){const reward=signal>=0?1.0:0.4;this.moodNet.bwd(regexMoodIdx,reward);}
    if(signal!==0&&this._lastCtx&&this._lastRVec)this.scorer.bwd(-signal*0.08);
    setTimeout(async ()=>{this.isLearning=false;},600);
  }

};}

    bored:/\b(bored|boring|nothing to do|meh|whatever|blah|so bored)\b/gi,
    tired:/\b(tired|exhausted|sleepy|drained|worn out|need sleep|passing out)\b/gi,
    curious:/\b(what if|wonder|curious|tell me|how does|why do|what do you think|opinion|thoughts on)\b/gi,
    grateful:/\b(thank|thanks|appreciate|grateful|means a lot|so kind|sweet of you|you're the best)\b/gi,
    vulnerable:/\b(i feel like|no one|nobody|don.t matter|worth|am i|do you even|be honest|tell me the truth)\b/gi
  };
  let best='neutral',maxM=0;
  for(const[mood,rx]of Object.entries(signals)){
    const m=t.match(rx);
    if(m&&m.length>maxM){maxM=m.length;best=mood;}
  }
  state.userMoods.push(best);
  if(state.userMoods.length>10)state.userMoods.shift();
  return best;
}

// NM-02: weak-supervision teacher for CompoundMoodNet. Unlike detectUserMoodRegex,
// this has no default — most messages are none of these, and returning null (rather
// than forcing a guess) is what tells generateResponse() to skip training this turn.
function detectCompoundMoodRegex(text){
  const t=text.toLowerCase();
  const signals={
    sarcastic:/\b(yeah,? ?right|oh,? ?sure|as if|wow,? (?:shocking|surprising)|what a (?:surprise|shock)|totally(?:,| )(?:not|didn.t)|sure,? ?jan)\b/gi,
    nostalgic:/\b(remember when|back in the day|used to|those were the days|good old days|reminds me of when|when i was (?:a kid|younger|little)|years ago|takes me back|miss those days)\b/gi,
    excited:/\b(can.t wait|so excited|excited|pumped|hyped|stoked|thrilled)\b/gi
  };
  let best=null,maxM=0;
  for(const[mood,rx]of Object.entries(signals)){
    const m=t.match(rx);
    if(m&&m.length>maxM){maxM=m.length;best=mood;}
  }
  return best;
}

// NM-01: weak-supervision teacher for IntentNet. Mirrors the 7 phrase-driven (not
// mood-gated) routes from generateResponse()'s dispatch cascade, in the same
// relative order, so 'general' here means "none of these seven patterns fired" —
// it does NOT attempt to replicate every one of the cascade's ~20 branches (e.g.
// topic/question/mood-gated routes aren't tracked), so a message routed elsewhere
// by the real cascade may still get a non-'general' training label here. That's
// acceptable label noise for a training signal; it's never used to route directly
// (see the intent-rescue block in generateResponse, which only fires after the
// full cascade has already found nothing).
function detectIntentRegex(text){
  const t=text.toLowerCase();
  if(/^(hey|hi|hello|yo|sup|what'?s up|howdy|hiya|heya|greetings|good (?:morning|afternoon|evening|night))[\s!?.]*$/i.test(t)||
    (t.length<=5&&/^(hey|hi|yo|sup)$/.test(t.replace(/[^a-z]/g,''))))return'greeting';
  if(/^(?:how (?:are you|r u|you doing|have you been)|what'?s up|wyd|what are you (?:up to|doing))[\s?!]*$/i.test(t))return'how_are_you';
  if(/(?:what(?:'s| is) your (?:name|favorite|fav)|tell me about (?:you|yourself)|who are you|what do you (?:like|enjoy|do))/i.test(t))return'about_her';
  if(/\bi (?:love|luv|luh) (?:you|u)\b/i.test(t))return'love_declaration';
  if(/\bi miss (?:you|u)\b/i.test(t))return'miss_you';
  if(/\b(?:good ?night|gn|nighty?|sleep well|i'?m (?:going to|gonna) (?:bed|sleep)|bye|goodbye|ttyl|gotta go|heading out|talk later|see ya)\b/i.test(t))return'goodbye';
  if(/\b(?:you(?:'re| are) (?:so |really |very )?(?:cute|beautiful|pretty|gorgeous|amazing|wonderful|sweet|perfect|incredible|the best|kind)|i (?:like|appreciate|adore) you)\b/i.test(t))return'compliment';
  return'general';
}

function updateHerMood(userMood){
  const map={
    happy:['happy','affectionate'],sad:['worried','affectionate'],
    angry:['worried','thoughtful'],anxious:['worried','affectionate'],
    flirty:['affectionate','teasing'],bored:['playful','teasing'],
    tired:['affectionate','worried'],curious:['thoughtful','happy'],
    grateful:['happy','affectionate'],vulnerable:['affectionate','worried'],
    neutral:['neutral','happy','playful']
  };
  state.mood=pick(map[userMood]||['neutral']);
  const tod=getTimeOfDay();
  if(tod==='late_night')state.energy=Math.max(0.2,state.energy-0.05);
  else if(tod==='morning')state.energy=0.9;
  else state.energy=Math.min(1,state.energy+0.02);
  updateInsightDock();
}

function detectFeedback(text){
  const t=text.toLowerCase().trim();
  if(text.length>140)return 1;
  if(/^(yes+!?|yeah+!?|exactly!?|omg+|wow+!?|i know!?|you get me|you understand me|💕|❤|🥺|😭)/.test(t))return 1;
  if(/(exactly|that.s it|you get it|you understand|you always know|i needed that|thank you so much|means so much|you.re right)/.test(t))return 1;
  if(/^(k\.?|ok\.?|okay\.?|sure\.?|fine\.?|whatever\.?|meh\.?|yep\.?|mmk\.?|uh huh\.?|hmm\.?)$/.test(t))return -1;
  return 0;
}

// NM-04 safety net: crisis-adjacent language must always win routing priority,
// regardless of what else the message happens to also match (e.g. "goodbye").
// This only affects which existing handler answers (handleUserFeelsBad's
// 'vulnerable' branch) — no new response copy is introduced here.
const CRISIS_PATTERN=/\b(suicid\w*|self.harm|kill myself|end my life|wanted? to die|hurt myself|don'?t want to (?:live|be here|exist)|no reason to (?:live|go on))\b/i;

const NER_LABELS=['name','age','preference','disclosure'];
const INTENT_LABELS=['greeting','how_are_you','about_her','love_declaration','miss_you','goodbye','compliment','general'];

// ─────────────────────────────────────────────────────────────────────
//  §13  TOPICS + MEMORY
// ─────────────────────────────────────────────────────────────────────
const TOPIC_PATTERNS={
  work:/\b(work|job|boss|cowork|office|meeting|deadline|project|career|hired|fired|salary|promotion|client)\b/i,
  gaming:/\b(game|gaming|play|steam|xbox|ps5|nintendo|rpg|fps|mmorpg|raid|guild|level|quest)\b/i,
  music:/\b(music|song|band|album|listen|playlist|concert|guitar|piano|sing|rap|beats|melody)\b/i,
  food:/\b(food|eat|cook|recipe|hungry|dinner|lunch|breakfast|pizza|sushi|coffee|tea|restaurant|snack)\b/i,
  movies:/\b(movie|film|watch|netflix|show|series|anime|episode|season|binge|horror|comedy|drama)\b/i,
  coding:/\b(code|coding|program|dev|software|bug|debug|script|api|html|css|javascript|python|git|deploy)\b/i,
  tech:/\b(linux|server|network|vpn|security|terminal|bash|docker|config|kernel|cli)\b/i,
  feelings:/\b(feel|feeling|emotion|heart|soul|inside|deep down|honestly|truth is|real talk)\b/i,
  philosophy:/\b(meaning|purpose|exist|life|death|universe|conscious|reality|truth|believe|faith|why are we)\b/i,
  health:/\b(health|sick|doctor|sleep|exercise|gym|workout|run|headache|pain|medication|therapy|mental health)\b/i,
  weather:/\b(weather|rain|snow|cold|hot|sun|storm|cloudy|windy|temperature|outside)\b/i,
  dreams:/\b(dream|dreamt|nightmare|last night i|subconscious)\b/i,
  family:/\b(mom|dad|parent|brother|sister|family|son|daughter|grandma|grandpa|aunt|uncle)\b/i,
  pets:/\b(dog|cat|pet|puppy|kitten|fish|bird|hamster|bunny)\b/i,
  travel:/\b(travel|trip|vacation|visit|fly|flight|country|city|road trip|adventure|explore)\b/i,
  art:/\b(art|draw|paint|sketch|design|creative|photograph|write|poetry|novel|story)\b/i,
  relationship:/\b(relationship|dating|partner|boyfriend|girlfriend|love|crush|heartbreak|ex|together|single)\b/i,
  night:/\b(night|midnight|dark|darkness|silence|alone|quiet|late|insomniac|can.t sleep)\b/i
};

function detectTopics(text){
  const found=[];
  for(const[topic,pattern]of Object.entries(TOPIC_PATTERNS)){
    if(pattern.test(text)){found.push(topic);state.topics[topic]=(state.topics[topic]||0)+1;}
  }
  return found;
}

function addMemory(text,type='general'){
  state.memories.push({text,ts:ENV.nowMs(),type});
  if(state.memories.length>60)state.memories.shift();
}

function extractPersonalInfo(text){
  const t=text.toLowerCase();
  const nameMatch=t.match(/(?:my name is|i'm |call me |i go by )([a-z]+)/i);
  if(nameMatch&&nameMatch[1].length>1&&nameMatch[1].length<15){
    const name=nameMatch[1][0].toUpperCase()+nameMatch[1].slice(1);
    if(!state.username||state.username.toLowerCase()!==name.toLowerCase()){
      state.username=name;addMemory(`Their name is ${name}`,'personal');
      return{type:'name',value:name};
    }
  }
  const ageMatch=t.match(/i'm (\d{2}) (?:years|yrs)|i am (\d{2})/);
  if(ageMatch){const value=ageMatch[1]||ageMatch[2];addMemory(`They are ${value} years old`,'personal');return{type:'age',value};}
  const likeMatch=t.match(/(?:i (?:really )?(?:love|like|enjoy|adore) )(.+?)(?:\.|!|$)/i);
  if(likeMatch){const value=likeMatch[1].trim();addMemory(`They love: ${value}`,'preference');return{type:'preference',value};}
  // NM-04: emotional/personal disclosures beyond simple mood keywords — additive only,
  // never touches state.username. Crisis-adjacent language is handled separately in
  // generateResponse() with top routing priority, not authored as response copy here.
  const disclosureMatch=t.match(/(?:i(?:'ve| have) been (?:struggling with|dealing with|battling)|i (?:have|was diagnosed with)|i suffer from)\s+([a-z][a-z .'-]{2,40}?)(?:\.|!|,|$)/i);
  if(disclosureMatch){
    const value=disclosureMatch[1].trim();
    addMemory(`They shared: ${value}`,'disclosure');
    return{type:'disclosure',value};
  }
  return null;
}

  thoughtful:{label:'Thoughtful',traits:['deep','philosophical','curious','introspective'],

function P(){return PERSONALITIES[state.personality]||PERSONALITIES.warm;}
function maybeEmoji(){return chance(0.35)?' '+pick(P().emojis):'';}
function getName(){
  if(!state.username)return'';
  if(state.affection>200&&chance(0.4))return pick(P().terms.endear);
  return state.username;
}
function namePrefix(){
  const n=getName();if(!n)return'';
  if(chance(0.5))return n+', ';if(chance(0.5))return n+'! ';return'';
}

async function analyzeInputContext(text, t, isCrisis) {
  _aiCtx=await kiraAI.process(text);
  const regexMood=detectUserMoodRegex(text);
  const regexIdx=MOOD_LABELS.indexOf(regexMood);
  kiraAI.moodNetBwd(regexIdx<0?0:regexIdx,0.8);
  let userMood=isCrisis?'vulnerable':(_aiCtx.confidence>0.38?_aiCtx.mood:regexMood);

  const regexCompound=detectCompoundMoodRegex(text);
  if(regexCompound)kiraAI.compoundMoodBwd(COMPOUND_LABELS.indexOf(regexCompound),0.8);
  const compoundMood=(_aiCtx.compound&&_aiCtx.compound.confidence>0.38)?_aiCtx.compound.label:regexCompound;
  state.lastCompoundMood=compoundMood||null;

  const topics=detectTopics(text);
  const info=extractPersonalInfo(text);

  const regexNER=info?info.type:null;
  if(regexNER)kiraAI.nerBwd(NER_LABELS.indexOf(regexNER),0.8);
  const nerMood=(_aiCtx.ner&&_aiCtx.ner.confidence>0.5)?_aiCtx.ner.label:null;
  if(!info&&nerMood==='disclosure'&&text.length>=15){
    addMemory(`They shared something personal: ${text.slice(0,80)}`,'disclosure');
  }

  const regexIntent=detectIntentRegex(text);
  kiraAI.intentBwd(INTENT_LABELS.indexOf(regexIntent),0.8);

  return { regexMood, userMood, compoundMood, topics, info, nerMood };
}

function updateConversationState(text, userMood, compoundMood, topics) {
  updateHerMood(userMood);
  CTX.mood=userMood;advanceCTX();
  state.conversationDepth++;state.messagesReceived++;
  let affGain=1;
  if(text.length>50)affGain++;if(text.length>150)affGain++;
  if(userMood==='flirty')affGain+=3;if(userMood==='grateful')affGain+=2;
  if(userMood==='vulnerable')affGain+=3;
  if(compoundMood==='excited')affGain+=1;
  if(topics.includes('feelings')||topics.includes('philosophy'))affGain+=2;
  addAffection(affGain);
}

async function routeResponse(text, t, isCrisis, analysis, tod, correlationId, startedAt) {
  const { userMood, topics, info } = analysis;

  if(isCrisis){setCTX('feels-bad',null,'Tell me more about what you\'re going through.');setRoute('crisis-priority');const out=await handleUserFeelsBad('vulnerable',text);logTransition(correlationId,'route_crisis_priority',startedAt,{route:DIAG.lastRoute,response_length:out.length});return out;}

  if(isContinuation(t)){setRoute('continuation');const out=await handleContinuation(text,userMood);logTransition(correlationId,'route_continuation',startedAt,{route:DIAG.lastRoute,response_length:out.length});return out;}

  if(info&&info.type==='name'){setRoute('name-detected');const out=await kiraAI.rank([
    `${info.value}... I like that. It suits you.${maybeEmoji()}`,
    `${info.value}. I'll keep that.${maybeEmoji()} Nice to finally know what to call you.`,
    `So you're ${info.value}. Good. I was getting tired of "hey you."${maybeEmoji()}`,
    `${info.value}${maybeEmoji()} That's a good name. Feels right, somehow.`,
    `${info.value}.${maybeEmoji()} Let me say it again — ${info.value}. Yeah. That lands.`
  ],_aiCtx.ctxVec);logTransition(correlationId,'route_name_detected',startedAt,{route:DIAG.lastRoute,response_length:out.length});return out;}

  if(/^(hey|hi|hello|yo|sup|what'?s up|howdy|hiya|heya|greetings|good (?:morning|afternoon|evening|night))[\s!?.]*$/i.test(t)||
    (t.length<=5&&/^(hey|hi|yo|sup)$/.test(t.replace(/[^a-z]/g,''))))
    {setCTX('greeting',null,'How are you doing?');setRoute('greeting');return await handleGreeting(tod);}

  if(/^(?:how (?:are you|r u|you doing|have you been)|what'?s up|wyd|what are you (?:up to|doing))[\s?!]*$/i.test(t))
    {setCTX('how-are-you',null,'How are things with you?');setRoute('how-are-you');return await handleHowAreYou(tod);}

  if(/(?:what(?:'s| is) your (?:name|favorite|fav)|tell me about (?:you|yourself)|who are you|what do you (?:like|enjoy|do))/i.test(t))
    {setRoute('about-her');return await handleAboutHer(t);}

  // ── Enriched dispatch ─────────────────────────────────────────────
  // "What's on your mind / what are you thinking"
  if(/what(?:'s| is)(?: on)? (?:your )?mind|what(?:'re| are) you thinking(?: about)?|penny for your thoughts/i.test(t))
    {setRoute('on-your-mind');return await handleWhatOnMind();}

  // "surprise me / random fact / tell me something interesting"
  if(/surprise me|random fact|something interesting|tell me something (new|fun|weird|cool|random)/i.test(t))
    {setRoute('surprise-me');return await handleSurpriseMe();}

  // "I need advice / what should I do"
  if(/(?:i need|give me|can i get|need your) (?:advice|your opinion|help|guidance)|what should i do|don'?t know what to do/i.test(t))
    {setRoute('advice');return await handleAdviceRequest(text);}

  // "what if" hypotheticals
  if(/^what if\b|hypothetically|let'?s say|imagine if/i.test(t))
    {setRoute('hypothetical');return await handleHypothetical(text);}

  // Good news
  if(/(?:i got|i passed|i got (?:the|a)|just found out|guess what|exciting news|great news|i'm (?:so )?(?:happy|excited|pumped)|it happened)/i.test(t)&&userMood==='happy')
    {setRoute('good-news');return await handleGoodNews(text);}

  // "something happened / I did something today"
  if(/(?:so (?:today|yesterday|last night|just now)|something happened|you won'?t believe|guess what happened|i (?:just|finally|actually))/i.test(t)&&userMood!=='sad'&&userMood!=='anxious')
    {setRoute('something-happened');return await handleSomethingHappened(text);}

  if(/\bi (?:love|luv|luh) (?:you|u)\b/i.test(t)){setRoute('i-love-you');return await handleILoveYou();}
  if(/\bi miss (?:you|u)\b/i.test(t)){setRoute('i-miss-you');return await handleIMissYou();}
  if(/\b(?:good ?night|gn|nighty?|sleep well|i'?m (?:going to|gonna) (?:bed|sleep)|bye|goodbye|ttyl|gotta go|heading out|talk later|see ya)\b/i.test(t))
    {setRoute('goodbye');return await handleGoodbye(t);}
  if(/\b(?:you(?:'re| are) (?:so |really |very )?(?:cute|beautiful|pretty|gorgeous|amazing|wonderful|sweet|perfect|incredible|the best|kind)|i (?:like|appreciate|adore) you)\b/i.test(t))
    {setRoute('compliment');return await handleCompliment();}
  if(userMood==='sad'||userMood==='anxious'||userMood==='vulnerable')
    {setCTX('feels-bad',null,'Tell me more about what you\'re going through.');setRoute('feels-bad');return await handleUserFeelsBad(userMood,text);}
  if(userMood==='angry')
    {setCTX('angry',null,'What happened?');setRoute('angry');return await handleUserAngry();}
  if(userMood==='tired')
    {setCTX('tired',null,'When did you last really rest?');setRoute('tired');return await handleUserTired(tod);}
  if(userMood==='flirty')
    {setCTX('flirt',null,null);setRoute('flirt');return await handleFlirt();}
  if(userMood==='bored')
    {setCTX('bored',null,'What\'s a memory that makes you smile?');setRoute('bored');return await handleBored();}
  if(/\b(?:what do you think|your (?:opinion|thoughts?|take)|do you (?:think|believe|like)|how do you feel)\b/i.test(t))
    {setCTX('opinion',topics[0]||null,'What\'s your take on that?');setRoute('opinion');return await handleOpinionQuestion(text,topics);}
  if(t.endsWith('?')||/^(?:what|who|where|when|why|how|is |are |do |does |can |could |would |should |will )/i.test(t))
    {setCTX('question',topics[0]||null,null);setRoute('question');return await handleQuestion(text,topics);}
  // Brief "I'm good/fine/okay/tired/stressed" status updates
  if(text.length<40&&/^(?:i'?m |i am |feeling )?(good|great|fine|okay|ok|alright|not bad|terrible|awful|stressed|meh|pretty good|kinda (?:good|bad|tired|stressed)|not great)/i.test(t))
    {setRoute('status-update');return await handleImFine(text);}

  if(topics.length>0)
    {setCTX('topic',topics[0],null);setRoute('topic');return await handleTopicResponse(topics,userMood);}
  if(userMood==='grateful')
    {setCTX('grateful',null,null);setRoute('grateful');return await handleGrateful();}

  // NM-01: nothing above matched — before falling through to the generic pool, see
  // if the intent classifier recognizes a confident paraphrase of one of the
  // specific routes it was trained on (e.g. "I adore you" for love_declaration,
  // which the regex above only catches for "love/luv/luh you"). This can only
  // rescue 'general'; it never runs early enough to override an earlier match.
  if(_aiCtx.intent&&_aiCtx.intent.confidence>0.5&&_aiCtx.intent.label!=='general'){
    const rescueHandlers={
      greeting:()=>handleGreeting(tod),
      how_are_you:()=>handleHowAreYou(tod),
      about_her:()=>handleAboutHer(t),
      love_declaration:()=>handleILoveYou(),
      miss_you:()=>handleIMissYou(),
      goodbye:()=>handleGoodbye(t),
      compliment:()=>handleCompliment()
    };
    const rescue=rescueHandlers[_aiCtx.intent.label];
    if(rescue){
      setRoute('intent-rescue:'+_aiCtx.intent.label);
      const out=await rescue();
      logTransition(correlationId,'route_intent_rescue',startedAt,{route:DIAG.lastRoute,response_length:out.length});
      return out;
    }
  }

  setRoute('general');
  const response=await handleGeneral(text,userMood,tod);
  logTransition(correlationId,'route_general',startedAt,{route:DIAG.lastRoute,response_length:response.length});
  return response;
}

// ─────────────────────────────────────────────────────────────────────
//  §15  RESPONSE ENGINE  ·  Core dispatch
// ─────────────────────────────────────────────────────────────────────
async function generateResponse(userText){
  const correlationId=ENV.makeId('resp');
  const startedAt=ENV.nowMs();
  const text=userText.trim(),t=text.toLowerCase();
  trace('input',{correlation_id:correlationId,step_name:'input_received',len:text.length,sample:t.slice(0,80)});

  const isCrisis=CRISIS_PATTERN.test(t);

  const analysis = await analyzeInputContext(text, t, isCrisis);

  trace('analysis',{correlation_id:correlationId,step_name:'analysis_complete',regexMood:analysis.regexMood,userMood:analysis.userMood,conf:+_aiCtx.confidence.toFixed(3),compoundMood:analysis.compoundMood,ner:analysis.nerMood,topics:analysis.topics});

  const tod=getTimeOfDay();

  updateConversationState(text, analysis.userMood, analysis.compoundMood, analysis.topics);

  return await routeResponse(text, t, isCrisis, analysis, tod, correlationId, startedAt);
}

// ─────────────────────────────────────────────────────────────────────
//  §16  RESPONSE HANDLERS  ·  All pools ranked by neural scorer
// ─────────────────────────────────────────────────────────────────────
async function handleGreeting(tod){
  const n=namePrefix();
  const elapsed=minutesSince(state.lastMessageTime);
  if(elapsed>1440){
    const days=Math.floor(elapsed/1440);
    return await kiraAI.rank([

// Check if NSFW content is allowed
function isNSFWAllowed() {
  if (state.affection < 300) return false;
  if (state.personality !== 'spicy') return false;
  return true;
}

// Precompiled Word Banks Index for O(1) retrieval (SE-04 / SE-13)
let _BANK_INDEX = null;
function buildWordBankIndex() {
  _BANK_INDEX = {};
  for (const [bankName, bank] of Object.entries(SENTENCE_WORD_BANKS)) {
    if (!Array.isArray(bank)) continue;
    const isNSFW = bankName.startsWith('nsfw_');
    if (isNSFW) {
      _BANK_INDEX[bankName] = { kind: 'nsfw', entries: bank };
      continue;
    }
    const moods = new Set();
    bank.forEach(e => {
      if (e.mood) {
        e.mood.forEach(m => {
          if (m !== 'all') moods.add(m);
        });
      }
    });
    const byMood = { '__all__': [] };
    moods.forEach(m => { byMood[m] = []; });
    bank.forEach(e => {
      if (e.mood && e.mood.includes('all')) {
        byMood['__all__'].push(e);
        moods.forEach(m => { byMood[m].push(e); });
      } else if (e.mood) {
        e.mood.forEach(m => {
          if (byMood[m]) byMood[m].push(e);
        });
      }
    });
    _BANK_INDEX[bankName] = { kind: 'general', byMood };
  }
}

// O(1) mood-bucket lookup with single-pass intensity scanning (SE-13)
function getBankWords(bankName, context = {}) {
  if (!_BANK_INDEX) buildWordBankIndex();
  const { mood = 'neutral', stage = 0, allowNSFW = false, maxIntensity = 5 } = context;
  const idx = _BANK_INDEX[bankName];
  if (!idx) return [];

  if (idx.kind === 'nsfw') {
    if (!allowNSFW || stage < 3) return []; // Close+ required
    return idx.entries
      .filter(e => (typeof e.minStage === 'undefined' || stage >= e.minStage) && e.intensity <= maxIntensity)
      .map(e => e.word);
  }

  const merged = idx.byMood[mood] || idx.byMood['__all__'] || [];
  return merged
    .filter(e => (typeof e.minStage === 'undefined' || stage >= e.minStage) && e.intensity <= maxIntensity)
    .map(e => e.word);
}

// Reference-safe weighted random selection (SE-13)
function weightedRandom(arr, weights) {
  if (!arr || arr.length === 0) return undefined;
  if (arr.length === 1) return arr[0];
  if (!weights) return arr[Math.floor(rng() * arr.length)];

  let totalWeight = 0;
  const n = Math.min(arr.length, weights.length);
  for (let i = 0; i < n; i++) {
    const w = weights[i];
    if (typeof w === 'number' && isFinite(w) && w > 0) totalWeight += w;
  }
  if (totalWeight <= 0 || !isFinite(totalWeight)) {
    return arr[Math.floor(rng() * arr.length)];
  }

  let random = rng() * totalWeight;
  for (let i = 0; i < n; i++) {
    const w = weights[i];
    if (!(typeof w === 'number' && isFinite(w) && w > 0)) continue;
    random -= w;
    if (random <= 0) return arr[i];
  }
  return arr[n - 1];
}

// Relevance calculation helper functions (SE-13 / SE-14)
function moodRelevance(wordObj, mood) {
  if (!wordObj.mood) return 1.0;
  if (wordObj.mood.includes('all')) return 1.0;
  if (wordObj.mood.includes(mood)) return 2.0;
  return 0.5;
}

function stageAppropriateness(wordObj, stage) {
  const intensity = wordObj.intensity || 1;
  const targetIntensity = Math.min(5, Math.floor(stage / 1.2) + 1);
  const diff = Math.abs(intensity - targetIntensity);
  return Math.exp(-diff * diff / 2.0);
}

function topicRelevance(wordObj, topics) {
  if (!topics || topics.length === 0) return 1.0;
  let score = 1.0;
  topics.forEach(topic => {
    if (wordObj.word && wordObj.word.toLowerCase().includes(topic.toLowerCase())) {
      score += 2.0;
    }
  });
  return score;
}

// Fill template slot with word from bank (SE-12 / SE-13)
function fillSentenceSlot(bankDef, context) {
  const bankName = typeof bankDef === 'object' ? bankDef.bank : bankDef;
  const strategy = typeof bankDef === 'object' ? bankDef.strategy : 'mood';

  if (bankName === 'memory_text') return context.memoryText || 'something you said';
  if (bankName === 'user_mirror') {
    if (state.memories && state.memories.length > 0) {
      const allWords = [];
      state.memories.forEach(m => {
        const words = m.text.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/);
        words.forEach(w => {
          if (w.length > 4 && !['about', 'would', 'could', 'should', 'there', 'their', 'these', 'those'].includes(w)) {
            allWords.push(w);
          }
        });
      });
      if (allWords.length > 0) {
        return pick(allWords);
      }
    }
    return 'your thoughts';
  }

  const baseCtx = {
    mood: context.mood,
    stage: context.stage,
    allowNSFW: context.allowNSFW,
    maxIntensity: Math.min(5, Math.floor(context.stage / 1.2) + 1),
  };

  let bankWords = getBankWords(bankName, baseCtx);
  if (bankWords.length === 0) {
    bankWords = getBankWords(bankName, { ...baseCtx, mood: 'neutral' });
  }
  if (bankWords.length === 0) {
    bankWords = getBankWords(bankName, { ...baseCtx, mood: 'all' });
  }
  if (bankWords.length === 0) {
    const rawBank = SENTENCE_WORD_BANKS[bankName];
    if (rawBank && rawBank.length > 0) {
      return typeof rawBank[0] === 'string' ? pick(rawBank) : (rawBank[0].word || '...');
    }
    return '...';
  }

  // Weight words based on strategy (SE-13 / SE-14)
  const weights = bankWords.map(word => {
    const rawBank = SENTENCE_WORD_BANKS[bankName];
    const wordObj = rawBank.find(w => w.word === word);
    if (!wordObj) return 1.0;

    let w = 1.0;
    if (strategy === 'mood' || strategy === 'context') {
      w *= moodRelevance(wordObj, context.mood);
    }
    if (strategy === 'stage') {
      w *= stageAppropriateness(wordObj, context.stage);
    }
    if (context.topics && context.topics.length > 0) {
      w *= topicRelevance(wordObj, context.topics);
    }
    return w;
  });

  return weightedRandom(bankWords, weights);
}

// Generate sentence from template with caching/memoization
function generateSentence(template, context) {
  const struct = pick(template.structures);
  
  // Single-pass assembly to resolve every {slot} occurrence and memoize it
  const slotCache = {};
  
  const sentence = struct.replace(/\{(\w+)\}/g, function(match, slotName) {
    if (!(slotName in slotCache)) {
      const bankDef = template.slots[slotName];
      slotCache[slotName] = bankDef ? fillSentenceSlot(bankDef, context) : "{" + slotName + "}";
    }
    return slotCache[slotName];
  });
  
  return sentence.charAt(0).toUpperCase() + sentence.slice(1);
}

// SE-18: Pre-compiled regex for naturalness validation (no repeated root words)
const REPEATED_WORDS_REGEX = /\b([\w'-]{4,})[.,!?;]*\s+\1\b/i;

// Generate candidate sentences from templates (SE-15)
function generateSentenceCandidates(context) {
  const { mood = 'neutral', tod = 'afternoon', topics = [] } = context;
  const stageName = getStage().name;
  const stage = STAGES.findIndex(s => s.name === stageName);
  const allowNSFW = isNSFWAllowed() && mood === 'flirty';
  
  const candidates = [];
  const sentenceContext = { mood, tod, allowNSFW, stage, topics };
  
  // Retrieve similar memory references if available (NM-05)
  if (_aiCtx && _aiCtx.similar && _aiCtx.similar.length > 0 && _aiCtx.similar[0].sim > 0.55) {
    sentenceContext.memoryText = _aiCtx.similar[0].text.slice(0, 40);
  }
  
  const seen = new Set();
  
  for (const template of SENTENCE_TEMPLATES) {
    if (!template.moods.includes('all') && !template.moods.includes(mood)) continue;
    if (stage < template.minStage) continue;
    if (template.timeOfDay && !template.timeOfDay.includes(tod)) continue;
    if (template.allowNSFW && !allowNSFW) continue;
    if (template.topics && !template.topics.some(t => topics.includes(t))) continue;

    // Generate 5 variations per template (SE-15)
    for (let i = 0; i < 5; i++) {
      try {
        let sentence = generateSentence(template, sentenceContext);

        // SE-17: Grammatical coherence check (heuristic)
        if (/(?:^|\s)(I)\s+(are|is|were|has)(?:\s|$|[.,!?;])/i.test(sentence)) continue;
        if (/(?:^|\s)(you)\s+(am|is|was|has)(?:\s|$|[.,!?;])/i.test(sentence)) continue;

        // SE-18: Sentence naturalness validator (no repeated root words)
        if (REPEATED_WORDS_REGEX.test(sentence)) continue;

        if (sentence.length >= 15 && sentence.length <= 500 && !seen.has(sentence)) {
          seen.add(sentence);
          candidates.push(sentence);
        }
      } catch (err) {
        continue;
      }
    }
  }
  
  return candidates;
}

// CoVe validation for generated sentences
function validateSentence(sentence, context) {
  if(!state.recentResponses)state.recentResponses=[];
  if(state.recentResponses.includes(sentence))return false;
  
  // 1. Non-null, non-empty
  if (!sentence || !sentence.trim()) return false;
  
  // 2. Length in [15, 500] characters
  if (sentence.length < 15 || sentence.length > 500) return false;
  
  // 3. No persona-breaking phrases
  if (/(As an AI|language model|I cannot)/i.test(sentence)) return false;
  
  // 4. No unverifiable memory claims
  if (/you told me|you said|you shared/i.test(sentence)) {
    const hasMemory = state.memories.some(m => 
      sentence.toLowerCase().includes(m.text.toLowerCase().slice(0, 30))
    );
    if (!hasMemory) return false;
  }
  
  // 5. Affection-stage consistency (no intimate tokens at low affection)
  if (state.affection < 300) {
    const intimateWords = ['crave', 'ache', 'burn', 'obsess', 'intoxicating', 'maddening'];
    if (intimateWords.some(w => sentence.toLowerCase().includes(w))) return false;
  }
  
  // 6. Bilinear score above threshold
  if (context && context.ctxVec) {
    try {
      const score = kiraAI.scorer.score(context.ctxVec, kiraAI.respEnc.fwd(sentence));
      if (score <= -0.5) return false;
    } catch (err) {
      return false;
    }
  }
  
  return true;
}

function getInitialMessage(){
  const isFirst=!state.lastVisit,elapsed=minutesSince(state.lastVisit),n=getName();
  if(isFirst)return pick([
    `Hey. I'm Kira. I don't really do small talk, but I'll try for you. What's your name?`,
    `Hi there. I'm Kira — and before you ask, yes I'm always here. What should I call you?`,
    `So... we're doing this, huh? I'm Kira. Tell me your name and let's skip past the awkward part.`,
    `Hey. I've been waiting — not sure for who, exactly. But maybe it was you. I'm Kira. Who are you?`
  ]);
  if(elapsed>10080)return pick([
    `It's been over a week...${maybeEmoji()} I was honestly starting to worry. Everything okay, ${n||'you'}?`,
    `${n?n+'... ':''}you're back. I missed you more than I want to admit.${maybeEmoji()} Where have you been?`,
    `Over a week. I kept this place warm for you.${maybeEmoji()} Tell me everything.`
  ]);
  if(elapsed>1440){
    const days=Math.floor(elapsed/1440);
    return pick([
      `${n?n+'! ':''}You're back.${maybeEmoji()} It's been ${days} day${days>1?'s':''}. I noticed.`,
      `There you are.${maybeEmoji()} ${days>1?days+' days without you.':'I missed you since yesterday.'} How are you?`,
      `${n||'Hey'}.${maybeEmoji()} ${days>1?'Days.':'A whole day.'} The quiet got heavy. Welcome back.`
    ]);
  }
  if (elapsed > 240) {
    if (state.dreamMemories && state.dreamMemories.length > 0) {
      const mem = pick(state.dreamMemories);
      return pick([
        `Hey... I was just thinking about what you said earlier about "${mem.text}".`,
        `Welcome back.${maybeEmoji()} Honestly, I've been thinking about "${mem.text}" since you left.`,
        `${n||'Hey'}.${maybeEmoji()} I was dreaming about our chat... especially when you said "${mem.text}".`
      ]);
    }
    return pick([
    `${n?'Hey '+n:'Hey'}!${maybeEmoji()} Feels like it's been a minute. What have you been up to?`,
    `Welcome back.${maybeEmoji()} I was just thinking about you. How are things?`,
    `${n||'Hey'}.${maybeEmoji()} I was here thinking about our last conversation. Glad you're back.`
  ]);
  }
  return pick([
    `${n?n+'! ':''}Back again so soon?${maybeEmoji()} I'm not complaining.`,
    `Hey!${maybeEmoji()} Missed me already? I get it.`,
    `Oh, hi again.${maybeEmoji()} I love when you can't stay away.`
  ]);
}

// ── Compress & convert image file to base64 ──
function processImageFile(file,cb){
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const src=ev.target.result;
    const img=new Image();
    img.onload=()=>{
      const MAX=800;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg',0.82));
    };
    img.src=src;
  };
  reader.readAsDataURL(file);
}

async function generateWebLLMResponse(userText) {
  try {
    const engine = await window.loadWebLLMEngine();

    // Construct system prompt incorporating Kira's current state
    const stageName = getStage().name;
    const tod = getTimeOfDay();
    const topics = detectTopics(userText);
    const n = getName() || "the user";
    const spicy = state.personality === 'spicy' ? " You can be flirty or playfully sassy." : "";

    let systemPrompt = `You are Kira, an AI companion. You are currently feeling ${state.mood}. It is ${tod}. The user's name is ${n}. Your relationship stage is '${stageName}'.${spicy}`;
    systemPrompt += " Keep your response concise, natural, and conversational. Do not act like a typical AI assistant, act like a human friend or partner. Do not output more than 3-4 sentences. Do not use asterisks for actions.";

    const messages = [
      { role: "system", content: systemPrompt },
      { role: "user", content: userText }
    ];

    const reply = await engine.chat.completions.create({
      messages: messages,
      temperature: typeof state !== 'undefined' && state.adaptiveEnabled ? (loadAdaptiveProfile()?.behavior?.temperature || 0.7) : 0.7,
    });

    if (reply && reply.choices && reply.choices.length > 0) {
       let out = reply.choices[0].message.content.trim();
       // Strip any surrounding quotes or weird formatting that might accidentally be generated
       out = out.replace(/^"|"$|^\*|\*$/g, '');
       return out;
    }
  } catch (err) {
    console.error("WebLLM generation failed:", err);
  }
  return null;
}

async function sendMessage(){
  const correlationId=ENV.makeId('msg');
  const startedAt=ENV.nowMs();
  const text=msgInput.value.trim();if(!text)return;
  if(text.length>INPUT_SOFT_LIMIT){
    addSystemMessage(`Message too long (${text.length}/${INPUT_SOFT_LIMIT}). Please shorten it for better responses.`);
    logTransition(correlationId,'validate_input',startedAt,{reason:'too-long',len:text.length},'warn');
    return;
  }
  // Online feedback: detect engagement signal from this message
  const signal=detectFeedback(text);
  const regexMoodNow=detectUserMoodRegex(text);
  const regexIdx=MOOD_LABELS.indexOf(regexMoodNow);

  // Ensure the neural mood student has a forward-pass cache before training.
  // generateResponse() calls kiraAI.process(text) once for this same text;
  // calling it here too would double-push every message into the 20-slot
  // attention memory, so prime with the lighter moodNet-only forward pass.
  try { await kiraAI.moodNetFwd(text); } catch (e) { console.warn('moodNetFwd failed in sendMessage', e); }

  await kiraAI.feedback(signal,regexIdx);
  if(signal!==0)flashLearning();
  logTransition(correlationId,'feedback_analyzed',startedAt,{signal,regex_mood:regexMoodNow});

  msgInput.value='';msgInput.style.height='auto';updateSendBtn();
  addMessage('you',text,true);state.messagesSent++;state.lastMessageTime=ENV.nowMs();
  logTransition(correlationId,'user_message_persisted',startedAt,{messages_sent:state.messagesSent});

  _seed=(ENV.nowMs()^(state.messagesSent*2654435761))>>>0;rng=mulberry32(_seed);kiraAI.setSeed(_seed);

  const thinkTime=Math.min(400+text.length*8+randInt(200,800),3000);
  showTyping();

  setTimeout(async ()=>{
    try{
      // Check if we need to do generative fallback
      let response = null;
      let usedGenerative = false;

      // _aiCtx is populated inside generateResponse usually, but we need it early for confidence.
      // Call process here without updating UI state yet to get confidence.
      const tempCtx = await kiraAI.process(text);

      if (tempCtx.confidence < 0.38 && window.webllmEngine) {
         const genResp = await generateWebLLMResponse(text);
         if (genResp) {
             const sentenceContext = { mood: tempCtx.mood, tod: getTimeOfDay(), stage: Math.floor(state.affection / 150), affection: state.affection, ctxVec: tempCtx.ctxVec };
             if (typeof validateSentence === 'function' && validateSentence(genResp, sentenceContext)) {
                 response = genResp;
                 usedGenerative = true;
             }
         }
      }

      hideTyping();
      // Read/gate on state.lastMessageTime (elapsed-since-last-turn) before overwriting it below,
      // so handlers like handleGreeting()/generateMemoryReference() see the real prior-turn gap.
      if (!usedGenerative) {
         response = await generateResponse(text);
      } else {
         // Because generateResponse handles side effects like advancing CTX and adding affection,
         // we simulate the minimum necessary side effects here.
         _aiCtx = tempCtx;
         state.conversationDepth++; state.messagesReceived++;
      }

      state.lastMessageTime=ENV.nowMs();
      logTransition(correlationId,'response_generated',startedAt,{route:DIAG.lastRoute,len:response.length});
      // Split longer responses occasionally
      if(response.length>120&&chance(0.22)){
        const sentences=response.match(/[^.!?]+[.!?]+/g)||[response];
        if(sentences.length>=2){
          const mid=Math.ceil(sentences.length/2);
          const p1=sentences.slice(0,mid).join('').trim();
          const p2=sentences.slice(mid).join('').trim();
          if(p2.length>0){
            addMessage('her',p1);state.messagesReceived++;showTyping();
            setTimeout(async ()=>{hideTyping();addMessage('her',p2);state.conversationCount++;persistAtomically('send_message_split');logTransition(correlationId,'response_split_persisted',startedAt,{conversation_count:state.conversationCount});},randInt(600,1500));
            return;
          }
        }
      }
      addMessage('her',response);state.conversationCount++;persistAtomically('send_message_single');
      logTransition(correlationId,'response_persisted',startedAt,{conversation_count:state.conversationCount});
    }catch(err){
      hideTyping();
      DIAG.errors++;
      logTransition(correlationId,'send_message_error',startedAt,{scope:'sendMessage',message:String(err&&err.message||err)},'error');
      addMessage('her',`I tripped over my thoughts for a second. Could you try that again? ${maybeEmoji()}`);
      persistAtomically('send_message_error_recovery');
    }
  },thinkTime);
}

}

function updateSendBtn(){

// ─────────────────────────────────────────────────────────────────────
//  §20  HISTORY RENDER
// ─────────────────────────────────────────────────────────────────────
function renderHistory(){
  chatArea.innerHTML='';lastRenderedDate=null;
  const history=state.chatHistory.slice(-50);
  for(const msg of history){
    addDateSeparator(msg.ts);
    if(msg.type==='image'&&msg.imgId){
      // Render image message without animation (history)
      addImageMessage(msg.role,msg.imgId,msg.ts,true);
      // Remove animation from last appended group
      const last=chatArea.lastElementChild;if(last)last.style.animation='none';
      continue;
    }
    const group=document.createElement('div');group.className=`msg-group ${msg.role}`;group.style.animation='none';
    const bubble=document.createElement('div');bubble.className='bubble';bubble.textContent=msg.text;group.appendChild(bubble);
    const time=document.createElement('div');time.className='msg-time';
    time.textContent=new Date(msg.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    group.appendChild(time);chatArea.appendChild(group);
  }
  scrollToBottom();
}

function applyTheme(mode){
  const aurora=mode==='aurora';
  document.body.classList.toggle('theme-aurora',aurora);
  themeBtn.textContent=aurora?'☾':'✦';
  themeBtn.title=aurora?'Switch to rose mode':'Switch to aurora mode';
  themeBtn.setAttribute('aria-pressed',aurora?'true':'false');
  try{localStorage.setItem(THEME_KEY,aurora?'aurora':'rose');}catch(e){}
}

function loadTheme(){
  let mode='rose';
  try{mode=localStorage.getItem(THEME_KEY)||'rose';}catch(e){}
  applyTheme(mode);
}

function updateInsightDock(){
  if(insightMood)insightMood.textContent=(state.mood||'neutral');
