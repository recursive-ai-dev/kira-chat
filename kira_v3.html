  if(insightStage)insightStage.textContent=getStage().name;
  if(insightStreak)insightStreak.textContent=`${state.currentStreak||0} day${(state.currentStreak||0)===1?'':'s'}`;
}

async function renderAIStats(){
  const totalParams=VOCAB*EDIM*3+EDIM*32+32+32*N_MOODS+N_MOODS+EDIM*EDIM
    +EDIM*COMPOUND_LABELS.length+COMPOUND_LABELS.length
    +EDIM*NER_LABELS.length+NER_LABELS.length
    +EDIM*INTENT_LABELS.length+INTENT_LABELS.length;
  let aiState = null;
  try {
    aiState = await kiraAI.requestSave();
  } catch (e) {}
  const memCount = aiState ? aiState.mem.K.length : 0;
  const tickCount = aiState ? aiState.tk : 0;
  const mnUpd = aiState ? aiState.mn.upd : 0;
  const cmnUpd = aiState && aiState.cmn ? aiState.cmn.upd : 0;
  const nerUpd = aiState && aiState.ner ? aiState.ner.upd : 0;
  const intentUpd = aiState && aiState.intent ? aiState.intent.upd : 0;
  const scUpd = aiState ? aiState.sc.upd : 0;
  aiStats.innerHTML=
    `<b>Model</b>: 3-layer MLP + Bilinear Scorer + Compound Mood + NER + Intent Heads<br>`+
    `<b>Optimizer</b>: Adam (β₁=0.9, β₂=0.999) + Grad Clip<br>`+
    `<b>Params</b>: ~${(totalParams/1000).toFixed(1)}K (Float32, ${(totalParams*4/1024).toFixed(0)} KB)<br>`+
    `<b>Training</b>: Online distillation (regex→neural)<br>`+
    `<b>Attention</b>: Scaled dot-product, ${memCount}/${MEM_CAP} slots<br>`+
    `<b>Messages processed</b>: ${tickCount}<br>`+
    `<b>Mood net updates</b>: ${mnUpd}<br>`+
    `<b>Compound mood updates</b>: ${cmnUpd} (last: ${escapeHTML(state.lastCompoundMood||'none')})<br>`+
    `<b>NER updates</b>: ${nerUpd}<br>`+
    `<b>Intent net updates</b>: ${intentUpd}<br>`+
    `<b>Scorer updates</b>: ${scUpd}<br>`+
    `<b>Diagnostics</b>: errors ${DIAG.errors}, route ${escapeHTML(DIAG.lastRoute)}<br>`+
    `<b>Trace tail</b>: ${escapeHTML(summarizeTrace())}`;
}

    chip.className='settings-chip'+(state.personality===p?' active':'');

// ─────────────────────────────────────────────────────────────────────
//  §22  DREAM STATE & BOOT
// ─────────────────────────────────────────────────────────────────────
function processDreamState() {
  if (!state.dreamMemories) state.dreamMemories = [];
  if (state.lastDreamIndex === undefined) state.lastDreamIndex = 0;

  if (state.lastDreamIndex >= state.chatHistory.length) return;

  let processed = false;
  for (let i = state.lastDreamIndex; i < state.chatHistory.length; i++) {
    const msg = state.chatHistory[i];
    if (msg.role === 'you' && msg.text) {
      // NOTE: kiraAI.encoder/.moodNet are only reachable inside the neural Worker;
      // the main-thread KiraAIProxy doesn't expose a raw-embedding RPC yet, so dream
      // consolidation is skipped rather than thrown. Follow-up: add an encoderFwd
      // RPC (mirroring moodNetFwd) to restore this.
      try {
        const moodProb = kiraAI.moodNet.fwd(msg.text);
        const vector = kiraAI.encoder.fwd(msg.text);
        let dominantMood = 0;
        let maxProb = -1;
        for (let j = 0; j < moodProb.length; j++) {
          if (moodProb[j] > maxProb) { maxProb = moodProb[j]; dominantMood = j; }
        }

        state.dreamMemories.push({
          text: msg.text,
          vector: M.pack(vector),
          mood: dominantMood,
          ts: msg.ts
        });
        processed = true;
      } catch (e) {
        // Skip this message's dream consolidation; still advance lastDreamIndex below.
      }
    }
  }

  state.lastDreamIndex = state.chatHistory.length;
  if (processed) saveState();
}

async function boot(){
  trace('boot','start');
  recoverIncompleteTx();
  await loadState();await loadAI();loadImages();loadProfilePic();
  applyProfilePic();

  // Streak tracking
  const now=ENV.nowDate(),lastDate=state.lastVisit?new Date(state.lastVisit).toDateString():null,today=now.toDateString();
  if(lastDate!==today){
    const yesterday=new Date(now.getTime()-86400000).toDateString();
    state.currentStreak=lastDate===yesterday?state.currentStreak+1:1;
    if(state.currentStreak>state.longestStreak)state.longestStreak=state.currentStreak;
  }

  if(state.chatHistory.length>0){renderHistory();pruneImages();}

  const initialMsg=getInitialMessage();
  const delay=state.chatHistory.length>0?800:1200;
  setTimeout(async ()=>{
    showTyping();
    setTimeout(async ()=>{
      hideTyping();addMessage('her',initialMsg);
      state.lastVisit=ENV.nowMs();state.lastGreeting=ENV.nowMs();
      persistAtomically('boot_initial_message');
    },randInt(800,1500));
  },delay);
  loadTheme();
  updateAffectionUI();updateSendBtn();updateInsightDock();msgInput.focus();

  if (window.requestIdleCallback) {
    window.requestIdleCallback(processDreamState);
  } else {
    setTimeout(processDreamState, 2000);
  }
}

boot();
})();
