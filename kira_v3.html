  msgInput.style.height=Math.min(msgInput.scrollHeight,120)+'px';

});

//  §20  HISTORY RENDER
// ─────────────────────────────────────────────────────────────────────
function renderHistory(){
  chatArea.innerHTML='';lastRenderedDate=null;
  const history=state.chatHistory.slice(-50);
  for(const msg of history){
    addDateSeparator(msg.ts);
    if(msg.type==='image'&&msg.imgId){
      // Render image message without animation (history)
      addImageMessage(msg.role,msg.imgId,msg.ts,true);
      // Remove animation from last appended group
      const last=chatArea.lastElementChild;if(last)last.style.animation='none';
      continue;
    }
    const group=document.createElement('div');group.className=`msg-group ${msg.role}`;group.style.animation='none';
    const bubble=document.createElement('div');bubble.className='bubble';bubble.textContent=msg.text;group.appendChild(bubble);
    const time=document.createElement('div');time.className='msg-time';
    time.textContent=new Date(msg.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    group.appendChild(time);chatArea.appendChild(group);
  }
  scrollToBottom();
}

}

function renderAIStats(){
  const totalParams=VOCAB*EDIM*3+EDIM*32+32+32*N_MOODS+N_MOODS+EDIM*EDIM;
  aiStats.innerHTML=
    `<b>Model</b>: 3-layer MLP + Bilinear Scorer<br>`+
    `<b>Optimizer</b>: Adam (β₁=0.9, β₂=0.999) + Grad Clip<br>`+
    `<b>Params</b>: ~${(totalParams/1000).toFixed(1)}K (Float32, ${(totalParams*4/1024).toFixed(0)} KB)<br>`+
    `<b>Training</b>: Online distillation (regex→neural)<br>`+
    `<b>Attention</b>: Scaled dot-product, ${kiraAI.memory.K.length}/${MEM_CAP} slots<br>`+
    `<b>Messages processed</b>: ${kiraAI.tick}<br>`+
    `<b>Mood net updates</b>: ${kiraAI.moodNet.updates}<br>`+
    `<b>Scorer updates</b>: ${kiraAI.scorer.updates}<br>`+
    `<b>Diagnostics</b>: errors ${DIAG.errors}, route ${DIAG.lastRoute}<br>`+
    `<b>Trace tail</b>: ${escapeHtml(summarizeTrace())}`;

  const adaptiveStats = document.getElementById('adaptive-stats');
  if (adaptiveStats) {
    if (!state.adaptiveEnabled) {
      adaptiveStats.innerHTML = 'Adaptive Architecture is Disabled';
    } else {
      const p = loadAdaptiveProfile();
      let dominantWeight = 'None';
      let maxW = 0;
      for (const t in p.personality.currentWeights) {
        if (p.personality.currentWeights[t] > maxW) {
          maxW = p.personality.currentWeights[t];
          dominantWeight = `${t} (${maxW.toFixed(2)})`;
        }
      }

      let trendStr = 'None';
      const trendData = detectMoodTrend();
      if (trendData) {
        trendStr = `${trendData.mood} (${Math.round(trendData.strength * 100)}%)`;
      }

      adaptiveStats.innerHTML =
        `<b>Engagement EMA</b>: ${p.engagementEMA.toFixed(2)}<br>`+
        `<b>Dominant Personality</b>: ${dominantWeight}<br>`+
        `<b>Mood Trend</b>: ${trendStr}<br>`+
        `<b>Memory Ref Prob</b>: ${p.memory.memoryRefProbability.toFixed(2)}`;
    }
  }
}

  personalityChips.innerHTML='';
  for(const p of Object.keys(PERSONALITIES)){

    chip.className='settings-chip'+(state.personality===p?' active':'');
    chip.textContent=PERSONALITIES[p].label;

// ─────────────────────────────────────────────────────────────────────
//  §22  DREAM STATE & BOOT
// ─────────────────────────────────────────────────────────────────────
function processDreamState() {
  if (!state.dreamMemories) state.dreamMemories = [];
  if (state.lastDreamIndex === undefined) state.lastDreamIndex = 0;

  if (state.lastDreamIndex >= state.chatHistory.length) return;

  let processed = false;
  for (let i = state.lastDreamIndex; i < state.chatHistory.length; i++) {
    const msg = state.chatHistory[i];
    if (msg.role === 'you' && msg.text) {
      const vector = kiraAI.encoder.fwd(msg.text);
      const moodProb = kiraAI.moodNet.fwd(msg.text);
      let dominantMood = 0;
      let maxProb = -1;
      for (let j = 0; j < moodProb.length; j++) {
        if (moodProb[j] > maxProb) { maxProb = moodProb[j]; dominantMood = j; }
      }

      state.dreamMemories.push({
        text: msg.text,
        vector: M.pack(vector),
        mood: dominantMood,
        ts: msg.ts
      });
      processed = true;
    }
  }

  state.lastDreamIndex = state.chatHistory.length;
  if (processed) saveState();
}

function boot(){
  trace('boot','start');
  recoverIncompleteTx();
  loadState();loadAI();loadImages();loadProfilePic();loadAdaptiveProfile();
  applyProfilePic();

  // Streak tracking
  const now=ENV.nowDate(),lastDate=state.lastVisit?new Date(state.lastVisit).toDateString():null,today=now.toDateString();
  if(lastDate!==today){
    const yesterday=new Date(now.getTime()-86400000).toDateString();
    state.currentStreak=lastDate===yesterday?state.currentStreak+1:1;
    if(state.currentStreak>state.longestStreak)state.longestStreak=state.currentStreak;
  }

  if(state.chatHistory.length>0){renderHistory();pruneImages();}

  const initialMsg=getInitialMessage();
  const delay=state.chatHistory.length>0?800:1200;
  setTimeout(()=>{
    showTyping();
    setTimeout(()=>{
      hideTyping();addMessage('her',initialMsg);
      state.lastVisit=ENV.nowMs();state.lastGreeting=ENV.nowMs();
      persistAtomically('boot_initial_message');
    },randInt(800,1500));
  },delay);
  loadTheme();
  updateAffectionUI();updateSendBtn();updateInsightDock();msgInput.focus();

  if (window.requestIdleCallback) {
    window.requestIdleCallback(processDreamState);
  } else {
    setTimeout(processDreamState, 2000);
  }
}

boot();
})();
