<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NM-05 Memory Surface Tests</title>
<style>
body{font-family:monospace;padding:20px;background:#0f0e17;color:#e8e0f0}
.pass{color:#5ae07a}.fail{color:#d46060}.section{margin:20px 0;padding:15px;background:#171526;border-radius:8px}
h2{color:#e8758a;margin-bottom:10px}
.test{margin:8px 0;padding:8px;background:#1e1b2e;border-radius:4px}
</style>
</head>
<body>
<h1>NM-05: Proactive Memory Surface Tests</h1>
<div id="results"></div>

<script>
// Test runner state
const results = [];
let win = window;
let initialized = false;

function assert(condition, message) {
  if (!condition) throw new Error(message);
}

async function ensureInitialized() {
  if (initialized) return;
  
  if (window.opener && window.opener.generateMemoryReference) {
    win = window.opener;
    initialized = true;
  } else {
    try {
      const html = await fetch('../kira_v3.html').then(r => {
        if (!r.ok) throw new Error('Failed to fetch kira_v3.html');
        return r.text();
      });
      const frame = document.createElement('iframe');
      frame.id = 'prod-frame';
      frame.style.width = '1px';
      frame.style.height = '1px';
      frame.style.border = '0';
      document.body.appendChild(frame);
      win = frame.contentWindow;
      
      await new Promise((resolve, reject) => {
        frame.onload = resolve;
        frame.onerror = () => reject(new Error('Failed to load iframe'));
        frame.srcdoc = html;
      });
      
      // Wait slightly for initialization
      await new Promise(r => setTimeout(r, 100));
      initialized = true;
    } catch (e) {
      document.getElementById('results').innerHTML = `<div class="test fail">Error initializing production code: ${e.message}</div>`;
      throw e;
    }
  }
  
  // Wire properties once initialized
  Object.defineProperty(window, 'state', {
    get: () => win.state,
    set: (v) => {
      if (win.state) {
        for (const k in win.state) delete win.state[k];
        Object.assign(win.state, v);
      }
    }
  });

  Object.defineProperty(window, '_aiCtx', {
    get: () => win._aiCtx,
    set: (v) => { win._aiCtx = v; }
  });
}

// Helper to run a test safely
async function runTest(name, fn) {
  try {
    await fn();
    results.push({ name, pass: true });
  } catch (e) {
    results.push({ name, pass: false, error: e.message });
  }
}

async function startTests() {
  await ensureInitialized();
  results.length = 0;
  
  // Save original chance and minutesSince functions
  const origChance = win.chance;
  const origMinutesSince = win.minutesSince;
  
  // Stub chance to bypass random probability gating
  win.chance = () => true;

  await runTest('NM-05-01: Memory surface does not trigger when sim < 0.55', async () => {
    state.affection = 200;
    state.lastMessageTime = win.ENV.nowMs() - 120 * 60000;
    state.memories = [{ text: 'I love programming', type: 'personal', ts: win.ENV.nowMs() }];
    _aiCtx = {
      similar: [{ sim: 0.50, text: 'I love programming' }],
      ctxVec: new Float32Array(16)
    };
    const ref = win.generateMemoryReference(_aiCtx.similar, 'greeting');
    assert(ref === null, 'Memory surface should not trigger when sim < 0.55');
  });

  await runTest('NM-05-02: Memory surface does not trigger when affection <= 150', async () => {
    state.affection = 150;
    state.lastMessageTime = win.ENV.nowMs() - 120 * 60000;
    state.memories = [{ text: 'I love programming', type: 'personal', ts: win.ENV.nowMs() }];
    _aiCtx = {
      similar: [{ sim: 0.60, text: 'I love programming' }],
      ctxVec: new Float32Array(16)
    };
    const ref = win.generateMemoryReference(_aiCtx.similar, 'greeting');
    assert(ref === null, 'Memory surface should not trigger when affection <= 150');
  });

  await runTest('NM-05-03: Memory surface does not trigger when elapsed <= 60 minutes', async () => {
    state.affection = 200;
    state.lastMessageTime = win.ENV.nowMs() - 30 * 60000;
    state.memories = [{ text: 'I love programming', type: 'personal', ts: win.ENV.nowMs() }];
    _aiCtx = {
      similar: [{ sim: 0.60, text: 'I love programming' }],
      ctxVec: new Float32Array(16)
    };
    const ref = win.generateMemoryReference(_aiCtx.similar, 'greeting');
    assert(ref === null, 'Memory surface should not trigger when elapsed <= 60 minutes');
  });

  await runTest('NM-05-04: Memory surface does not trigger for non-existent memories (CoVe check)', async () => {
    state.affection = 200;
    state.lastMessageTime = win.ENV.nowMs() - 120 * 60000;
    state.memories = [{ text: 'I love programming', type: 'personal', ts: win.ENV.nowMs() }];
    _aiCtx = {
      similar: [{ sim: 0.60, text: 'I hate programming' }],
      ctxVec: new Float32Array(16)
    };
    const ref = win.generateMemoryReference(_aiCtx.similar, 'greeting');
    assert(ref === null, 'Memory surface should not trigger for fabricated memories');
  });

  await runTest('NM-05-05: Memory text is truncated to 40 characters', async () => {
    state.affection = 200;
    state.lastMessageTime = win.ENV.nowMs() - 120 * 60000;
    const longText = 'I love programming and building amazing things with code every single day';
    state.memories = [{ text: longText, type: 'personal', ts: win.ENV.nowMs() }];
    _aiCtx = {
      similar: [{ sim: 0.60, text: longText }],
      ctxVec: new Float32Array(16)
    };
    const ref = win.generateMemoryReference(_aiCtx.similar, 'greeting');
    assert(ref !== null, 'Memory reference should be generated');
    const match = ref.match(/'([^']+)'/);
    assert(match !== null, 'Should find memory text in quotes');
    assert(match[1].length === 40, `Memory should be truncated to 40 chars, got ${match[1].length}`);
  });

  await runTest('NM-05-06: Only personal memories are surfaced in greeting context', async () => {
    state.affection = 200;
    state.lastMessageTime = win.ENV.nowMs() - 120 * 60000;
    state.memories = [{ text: 'I love programming', type: 'general', ts: win.ENV.nowMs() }];
    _aiCtx = {
      similar: [{ sim: 0.60, text: 'I love programming' }],
      ctxVec: new Float32Array(16)
    };
    const ref = win.generateMemoryReference(_aiCtx.similar, 'greeting');
    assert(ref === null, 'Only personal memories should be surfaced in greeting context');
  });

  await runTest('NM-05-07: Memory surface triggers when all conditions are met', async () => {
    state.affection = 200;
    state.lastMessageTime = win.ENV.nowMs() - 120 * 60000;
    state.memories = [{ text: 'I love programming', type: 'personal', ts: win.ENV.nowMs() }];
    _aiCtx = {
      similar: [{ sim: 0.60, text: 'I love programming' }],
      ctxVec: new Float32Array(16)
    };
    const ref = win.generateMemoryReference(_aiCtx.similar, 'greeting');
    assert(ref !== null, 'Memory surface should trigger when all conditions are met');
    assert(ref.includes('I love programming'), 'Should contain the memory text');
  });

  await runTest('NM-05-08: Fallback when _aiCtx.similar is empty', async () => {
    state.affection = 200;
    state.lastMessageTime = win.ENV.nowMs() - 120 * 60000;
    state.memories = [{ text: 'I love programming', type: 'personal', ts: win.ENV.nowMs() }];
    _aiCtx = {
      similar: [],
      ctxVec: new Float32Array(16)
    };
    const ref = win.generateMemoryReference(_aiCtx.similar, 'greeting');
    assert(ref === null, 'Should gracefully handle empty similar array');
  });

  await runTest('NM-05-09: Fallback when _aiCtx.similar is null', async () => {
    state.affection = 200;
    state.lastMessageTime = win.ENV.nowMs() - 120 * 60000;
    state.memories = [{ text: 'I love programming', type: 'personal', ts: win.ENV.nowMs() }];
    _aiCtx = {
      similar: null,
      ctxVec: new Float32Array(16)
    };
    const ref = win.generateMemoryReference(_aiCtx.similar, 'greeting');
    assert(ref === null, 'Should gracefully handle null similar');
  });

  // Restore stubs
  win.chance = origChance;
  win.minutesSince = origMinutesSince;

  // Render results
  const container = document.getElementById('results');
  const passed = results.filter(r => r.pass).length;
  const failed = results.filter(r => !r.pass).length;

  container.innerHTML = `
    <div class="section">
      <h2>Summary</h2>
      <div>Total: ${results.length} | <span class="pass">Passed: ${passed}</span> | <span class="fail">Failed: ${failed}</span></div>
    </div>
    <div class="section">
      <h2>Test Results</h2>
      ${results.map(r => `
        <div class="test ${r.pass ? 'pass' : 'fail'}">
          ${r.pass ? '✓' : '✗'} ${r.name}
          ${r.error ? `<br><small>Error: ${r.error}</small>` : ''}
        </div>
      `).join('')}
    </div>
  `;

  console.log(`NM-05 Tests: ${passed}/${results.length} passed`);
}

// Start async init on window load
window.addEventListener('load', startTests);
</script>
</body>
</html>
