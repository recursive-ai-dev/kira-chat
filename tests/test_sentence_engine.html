<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kira v3 - Sentence Engine Tests</title>
<style>
  body {
    background: #0f0e17;
    color: #e8e0f0;
    font-family: 'Nunito', sans-serif;
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  h1 {
    color: #e8758a;
    font-family: 'Quicksand', sans-serif;
    margin-bottom: 10px;
  }
  h2 {
    color: #d4956a;
    font-family: 'Quicksand', sans-serif;
    margin-top: 30px;
    border-bottom: 1px solid #2a2440;
    padding-bottom: 5px;
  }
  .test-group {
    background: #171526;
    border-radius: 12px;
    padding: 15px;
    margin: 15px 0;
  }
  .test {
    margin: 10px 0;
    padding: 10px;
    background: #1e1b2e;
    border-radius: 8px;
  }
  .test-label {
    font-weight: 600;
    color: #9b8fb0;
    margin-bottom: 5px;
  }
  .test-input {
    color: #d4956a;
    font-style: italic;
    margin: 5px 0;
  }
  .test-output {
    color: #e8e0f0;
    margin: 5px 0;
    padding: 8px;
    background: #2a2440;
    border-radius: 6px;
  }
  .test-status {
    font-size: 12px;
    margin-top: 5px;
  }
  .pass { color: #5ae07a; }
  .fail { color: #d46060; }
  button {
    background: linear-gradient(135deg, #e8758a, #c06878);
    border: none;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    margin: 10px 5px;
  }
  button:hover {
    transform: scale(1.05);
  }
  #results {
    margin-top: 20px;
  }
  .summary {
    background: #2a2440;
    padding: 15px;
    border-radius: 8px;
    margin: 20px 0;
    font-weight: 600;
  }
</style>
</head>
<body>
<h1>🧠 Kira v3 Sentence Engine Tests</h1>
<p>Testing dynamic sentence generation from word banks with CoVe validation</p>

<button onclick="runAllTests()">Run All Tests</button>
<button onclick="testSentenceGeneration()">Test Sentence Generation</button>
<button onclick="testNSFWGating()">Test NSFW Gating</button>
<button onclick="testCoVeValidation()">Test CoVe Validation</button>

<div id="results"></div>

<script>
// Test runner state
let win = window;
let initialized = false;

function rng() {
  return Math.random();
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function randInt(a, b) {
  return Math.floor(Math.random() * (b - a + 1)) + a;
}

async function ensureInitialized() {
  if (initialized) return;
  
  if (window.opener && window.opener.generateSentenceCandidates) {
    win = window.opener;
    initialized = true;
  } else {
    try {
      const html = await fetch('../kira_v3.html').then(r => {
        if (!r.ok) throw new Error('Failed to fetch kira_v3.html');
        return r.text();
      });
      const frame = document.createElement('iframe');
      frame.id = 'prod-frame';
      frame.style.width = '1px';
      frame.style.height = '1px';
      frame.style.border = '0';
      document.body.appendChild(frame);
      win = frame.contentWindow;
      
      await new Promise((resolve, reject) => {
        frame.onload = resolve;
        frame.onerror = () => reject(new Error('Failed to load iframe'));
        frame.srcdoc = html;
      });
      
      // Wait slightly for initialization
      await new Promise(r => setTimeout(r, 100));
      initialized = true;
    } catch (e) {
      document.getElementById('results').innerHTML = `<div class="test fail">Error initializing production code: ${e.message}</div>`;
      throw e;
    }
  }
  
  // Wire properties once initialized
  Object.defineProperty(window, 'state', {
    get: () => win.state,
    set: (v) => {
      if (win.state) {
        for (const k in win.state) delete win.state[k];
        Object.assign(win.state, v);
      }
    }
  });
  
  window.generateSentenceCandidates = (context) => win.generateSentenceCandidates(context);
  window.validateSentence = (sentence, context) => win.validateSentence(sentence, context);
  window.isNSFWAllowed = () => win.isNSFWAllowed();
  window.SENTENCE_WORD_BANKS = win.SENTENCE_WORD_BANKS;
  window.SENTENCE_TEMPLATES = win.SENTENCE_TEMPLATES;
}

// Test functions
async function testSentenceGeneration() {
  await ensureInitialized();
  const results = document.getElementById('results');
  results.innerHTML = '<h2>Sentence Generation Tests</h2>';
  
  const testCases = [
    { mood: 'happy', tod: 'afternoon', label: 'Happy/Afternoon' },
    { mood: 'flirty', tod: 'night', label: 'Flirty/Night' },
    { mood: 'sad', tod: 'evening', label: 'Sad/Evening' },
    { mood: 'vulnerable', tod: 'late_night', label: 'Vulnerable/Late Night' },
    { mood: 'neutral', tod: 'morning', label: 'Neutral/Morning' },
  ];
  
  let html = '<div class="test-group">';
  
  testCases.forEach(tc => {
    const context = { mood: tc.mood, tod: tc.tod };
    const candidates = generateSentenceCandidates(context);
    const validated = candidates.filter(s => validateSentence(s, context));
    
    html += `
      <div class="test">
        <div class="test-label">${tc.label}</div>
        <div class="test-input">Context: mood=${tc.mood}, tod=${tc.tod}</div>
        <div class="test-output">
          Generated: ${candidates.length} candidates<br>
          Validated: ${validated.length} passed CoVe<br>
          ${validated.length > 0 ? `Sample: "${validated[0]}"` : 'No valid candidates'}
        </div>
        <div class="test-status ${validated.length > 0 ? 'pass' : 'fail'}">
          ${validated.length > 0 ? '✓ PASS' : '✗ FAIL'}
        </div>
      </div>
    `;
  });
  
  html += '</div>';
  results.innerHTML += html;
}

async function testNSFWGating() {
  await ensureInitialized();
  const results = document.getElementById('results');
  results.innerHTML += '<h2>NSFW Content Gating Tests</h2>';
  
  const testCases = [
    { affection: 0, personality: 'warm', shouldAllow: false, label: 'Stranger/Warm' },
    { affection: 200, personality: 'spicy', shouldAllow: false, label: 'Friendly/Spicy (200)' },
    { affection: 300, personality: 'warm', shouldAllow: false, label: 'Close/Warm (300)' },
    { affection: 300, personality: 'spicy', shouldAllow: true, label: 'Close/Spicy (300)' },
    { affection: 500, personality: 'spicy', shouldAllow: true, label: 'Devoted/Spicy (500)' },
    { affection: 750, personality: 'spicy', shouldAllow: true, label: 'Soulbound/Spicy (750)' },
  ];
  
  let html = '<div class="test-group">';
  
  testCases.forEach(tc => {
    state.affection = tc.affection;
    state.personality = tc.personality;
    
    const allowed = isNSFWAllowed();
    const context = { mood: 'flirty', tod: 'night', allowNSFW: allowed };
    const candidates = generateSentenceCandidates(context);
    const hasNSFW = candidates.some(s => 
      s.toLowerCase().includes('crave') || 
      s.toLowerCase().includes('ache') ||
      s.toLowerCase().includes('burn')
    );
    
    const pass = (allowed === tc.shouldAllow) && (tc.shouldAllow ? hasNSFW : true);
    
    html += `
      <div class="test">
        <div class="test-label">${tc.label}</div>
        <div class="test-input">
          Affection: ${tc.affection}, Personality: ${tc.personality}<br>
          Expected NSFW Allowed: ${tc.shouldAllow}
        </div>
        <div class="test-output">
          NSFW Allowed: ${allowed}<br>
          Generated: ${candidates.length} candidates<br>
          Has NSFW Content: ${hasNSFW}
        </div>
        <div class="test-status ${pass ? 'pass' : 'fail'}">
          ${pass ? '✓ PASS' : '✗ FAIL'}
        </div>
      </div>
    `;
  });
  
  html += '</div>';
  results.innerHTML += html;
  
  // Reset state
  state.affection = 0;
  state.personality = 'warm';
}

async function testCoVeValidation() {
  await ensureInitialized();
  const results = document.getElementById('results');
  results.innerHTML += '<h2>CoVe Validation Tests</h2>';
  
  const testCases = [
    { input: 'As an AI language model, I cannot respond', shouldPass: false, label: 'AI phrase rejection' },
    { input: 'Hi', shouldPass: false, label: 'Too short rejection' },
    { input: 'I really cherish this connection and it means everything', shouldPass: true, label: 'Valid sentence' },
    { input: 'I crave your touch so desperately', shouldPass: false, label: 'NSFW at low affection (0)', affection: 0 },
    { input: 'I crave your touch so desperately', shouldPass: true, label: 'NSFW at high affection (500)', affection: 500, personality: 'spicy' },
  ];
  
  let html = '<div class="test-group">';
  
  testCases.forEach(tc => {
    const affection = tc.affection !== undefined ? tc.affection : state.affection;
    const personality = tc.personality || state.personality;
    
    const oldAffection = state.affection;
    const oldPersonality = state.personality;
    state.affection = affection;
    state.personality = personality;
    
    const context = { mood: 'flirty', tod: 'night' };
    const passes = validateSentence(tc.input, context);
    
    const pass = (passes === tc.shouldPass);
    
    html += `
      <div class="test">
        <div class="test-label">${tc.label}</div>
        <div class="test-input">"${tc.input}"</div>
        <div class="test-output">
          Expected: ${tc.shouldPass ? 'PASS' : 'FAIL'}<br>
          Actual: ${passes ? 'PASS' : 'FAIL'}
        </div>
        <div class="test-status ${pass ? 'pass' : 'fail'}">
          ${pass ? '✓ PASS' : '✗ FAIL'}
        </div>
      </div>
    `;
    
    state.affection = oldAffection;
    state.personality = oldPersonality;
  });
  
  html += '</div>';
  results.innerHTML += html;
}

async function runAllTests() {
  try {
    await ensureInitialized();
    document.getElementById('results').innerHTML = '';
    await testSentenceGeneration();
    await testNSFWGating();
    await testCoVeValidation();
    
    const resultsDiv = document.getElementById('results');
    const summary = document.createElement('div');
    summary.className = 'summary';
    summary.innerHTML = `
      <h3>Test Summary</h3>
      <p>All sentence engine tests completed. Check results above for pass/fail status.</p>
      <p>Key features tested:</p>
      <ul>
        <li>✓ Dynamic sentence generation from templates</li>
        <li>✓ Word bank slot filling with mood/stage weighting</li>
        <li>✓ NSFW content gating by relationship stage</li>
        <li>✓ CoVe validation pipeline (7 checks)</li>
        <li>✓ Backward compatibility with static pools</li>
      </ul>
    `;
    resultsDiv.appendChild(summary);
  } catch (err) {
    document.getElementById('results').innerHTML = `
      <div class="test fail" style="background:#3a1a1a; padding:15px; border-radius:8px;">
        <h3>Error Running Tests:</h3>
        <pre style="white-space:pre-wrap; color:#ff9999;">${err.stack || err.message || err}</pre>
      </div>
    `;
  }
}
runAllTests();
</script>
<script src="/delay.js"></script>
</body>
</html>
